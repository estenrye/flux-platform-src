apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-token
  namespace: crossplane-system
spec:
  secretStoreRef:
    name: 1password-sdk
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  target:
    name: github-token
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      metadata:
        labels:
          app: crossplane-provider-github
        annotations:
          description: "GitHub App credentials for Crossplane Provider GitHub, managed by External Secrets Operator"
      data:
        credentials: |
          {"app_auth":[{"id":"{{ .app_id }}","installation_id":"{{ .installation_id }}","pem_file":"{{ .pem_file | replace "\n" "\\n" }}"}],"owner":"{{ .owner }}"}
  data:
    - secretKey: app_id
      remoteRef:
        key: qok5yzeh4j7k44ckqjpjdrq4ue/app_id
    - secretKey: installation_id
      remoteRef:
        key: qok5yzeh4j7k44ckqjpjdrq4ue/installation_id
    - secretKey: pem_file
      remoteRef:
        key: qok5yzeh4j7k44ckqjpjdrq4ue/crossplane-rye-ninja.2026-05-25.private-key.pem
    - secretKey: owner
      remoteRef:
        key: qok5yzeh4j7k44ckqjpjdrq4ue/owner