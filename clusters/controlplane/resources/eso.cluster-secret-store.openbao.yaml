# M3 step 6: ESO -> OpenBao wiring. Scope confirmed clean of circularity —
# see docs/memory/m3-step6-secret-migration-eligibility.md. OpenBao is
# unsealed manually (docs/runbooks/openbao-unseal.md); the kv-v2 mount,
# kubernetes auth method, policy, and role this store depends on were
# configured by .bin/configure-openbao-crossplane-secrets.sh, not by any
# manifest here (OpenBao has no CRD-based config surface).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
  namespace: external-secrets-operator
spec:
  conditions:
    - namespaces:
        - crossplane-system
  provider:
    vault:
      server: "https://openbao.openbao.svc:8200"
      path: secret
      version: v2
      caProvider:
        type: ConfigMap
        name: ryezone-labs-intermediate-controlplane
        key: intermediate.crt
        namespace: external-secrets-operator
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-crossplane
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-operator
