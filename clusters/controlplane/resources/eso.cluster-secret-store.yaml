apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: 1password-sdk
  namespace: external-secrets-operator
spec:
  conditions:
    - namespaces:
      - crossplane-system
      - external-dns
  provider:
    onepasswordSDK:
      vault: controlplane
      auth:
        serviceAccountSecretRef:
          name: onepassword-sdk-token
          namespace: external-secrets-operator
          key: token
      integrationInfo:
        name: integration-info
        version: v1
