apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-creds
  namespace: crossplane-system
spec:
  # M3 step 6: migrated from the 1password-sdk store to OpenBao — see
  # docs/memory/m3-step6-secret-migration-eligibility.md.
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  target:
    name: cloudflare-creds
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      metadata:
        labels:
          app: crossplane-provider-cloudflare
        annotations:
          description: "Cloudflare credentials for Crossplane Provider Cloudflare, managed by External Secrets Operator"
      data:
        credentials: |
          {"api_token":"{{ .api_token }}"}
  data:
    - secretKey: api_token
      remoteRef:
        key: crossplane/cloudflare-api-token
        property: api_token
