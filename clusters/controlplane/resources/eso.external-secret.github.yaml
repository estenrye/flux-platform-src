apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-token
  namespace: crossplane-system
spec:
  # M3 step 6: migrated from the 1password-sdk store to OpenBao — see
  # docs/memory/m3-step6-secret-migration-eligibility.md.
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  target:
    name: github-token
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      metadata:
        labels:
          app: crossplane-provider-github
        annotations:
          description: "GitHub App credentials for Crossplane Provider GitHub, managed by External Secrets Operator"
      data:
        credentials: |
          {"app_auth":[{"id":"{{ .app_id }}","installation_id":"{{ .installation_id }}","pem_file":"{{ .pem_file | replace "\n" "\\n" }}"}],"owner":"{{ .owner }}"}
  data:
    - secretKey: app_id
      remoteRef:
        key: crossplane/github-auth-app
        property: app_id
    - secretKey: installation_id
      remoteRef:
        key: crossplane/github-auth-app
        property: installation_id
    - secretKey: pem_file
      remoteRef:
        key: crossplane/github-auth-app
        property: private-key
    - secretKey: owner
      remoteRef:
        key: crossplane/github-auth-app
        property: owner
