apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dns-credentials
  namespace: external-dns
spec:
  secretStoreRef:
    name: 1password-sdk
    kind: ClusterSecretStore
  refreshPolicy: OnChange
  target:
    name: dns-credentials
    creationPolicy: Owner
    deletionPolicy: Delete
    template:
      metadata:
        labels:
          app: external-dns-cloudflare
        annotations:
          description: "Cloudflare API credentials for external-dns (public DNS), managed by External Secrets Operator"
      data:
        # zone_name/zone_id are not secret, just templated alongside the
        # real credential because the external-dns/cloudflare Deployment
        # (applications/external-dns/cloudflare/base/values.yaml) sources
        # all three via secretKeyRef from this one Secret.
        password: "{{ .api_token }}"
        zone_name: rye.ninja
        zone_id: "186a0fa51e8dd54ee6910d0f35d5f0c8"
  data:
    - secretKey: api_token
      remoteRef:
        key: cloudflare-api-token/credential
