apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-providers
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane-core
  interval: 10m0s
  path: ./clusters/controlplane/crossplane-providers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-platform-rendered
  timeout: 5m0s
  # wait: true left off deliberately. Tried healthCheckExprs (CEL) for
  # Provider/Function's Installed/Healthy conditions — every variant
  # (current+failed, current-only, current with has() guards) failed with
  # "no such attribute(s): self.status[...]" even though the CRD schema
  # and live objects both have a well-formed status.conditions array, and
  # persisted across a kustomize-controller restart (rules out a stale/
  # cached CEL program). Then tried wait: true with no custom
  # healthCheckExprs (kstatus's generic/default check) — the Kustomization
  # sat "Reconciliation in progress" for 8+ minutes past its own 5m
  # timeout despite every Provider/Function already showing
  # Installed=True/Healthy=True in kubectl, so kstatus's default handling
  # of these conditions appears to hit the same underlying issue as the
  # CEL path. Genuine limitation in this Flux version for these CRDs, not
  # a caching or config bug — not pursued further.
  #
  # Without any waiting, this Kustomization reports Ready as soon as
  # apply succeeds (confirmed: providers/functions were actually created
  # and became Healthy long before the wait loop would have finished).
  # dependsOn still gates crossplane-providers behind crossplane-core and
  # crossplane-resources behind crossplane-providers, which is what
  # actually matters — that solves the real problem (Flux's atomic
  # dry-run racing Crossplane's runtime CRD registration on first
  # bootstrap). crossplane-resources may attempt its own dry-run before a
  # provider's specific CRD is registered; if so it fails that one
  # attempt and retries on its own interval — self-healing, not the
  # original all-or-nothing failure. See
  # docs/memory/crossplane-bootstrap-phasing.md.
