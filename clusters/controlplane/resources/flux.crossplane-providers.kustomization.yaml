apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-providers
  namespace: flux-system
spec:
  dependsOn:
    - name: crossplane-core
  interval: 10m0s
  path: ./clusters/controlplane/crossplane-providers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-platform-rendered
  wait: true
  timeout: 5m0s
  # Tried healthCheckExprs (CEL) for Provider/Function's Installed/Healthy
  # conditions — every variant (current+failed, current-only, current with
  # has() guards) failed with "no such attribute(s): self.status[...]"
  # even though the CRD schema and the live objects both have a
  # well-formed status.conditions array, and even after restarting
  # kustomize-controller to rule out a stale/cached CEL program. This
  # looks like a genuine limitation in how this Flux version's CEL
  # evaluation sees Provider/Function status, not a caching bug or a bad
  # expression. Dropped the health check entirely and rely on wait: true's
  # default behavior + dependsOn — that combination already solves the
  # actual problem (Flux's atomic dry-run racing Crossplane's runtime CRD
  # registration on first bootstrap), just without fine-grained "is the
  # package actually running" gating. crossplane-resources retries on its
  # own dependsOn cadence if it's attempted before a provider's specific
  # CRD is registered — self-healing, not the original all-or-nothing
  # failure. See docs/memory/crossplane-bootstrap-phasing.md.
