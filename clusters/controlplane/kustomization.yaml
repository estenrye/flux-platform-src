apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Baseline for the IPv6-only controlplane cluster (M1 design §7.2). Calico
# first: Talos installs with CNI none, nodes stay NotReady until it lands.
# M2 migration in progress (2026-07-13 design): step-ca stack landed in
# step 3, cert-manager stack in step 4; still absent: crossplane (step 6),
# ESO 1Password store (step 9).
resources:
  - ../../applications/calico/controlplane
  - ../../applications/global-network-policy-default-deny/controlplane
  - ../../applications/priority-classes
  - ../../applications/prometheus-operator-crds/base
  - ../../applications/reloader/base
  - ../../applications/gateway-api-crds/base
  - ../../applications/envoy-gateway-crds/base
  - ../../applications/envoy-gateway/base
  - ../../applications/external-dns/unifi/base
  - ../../applications/truenas-csi/base
  - ../../applications/flux/base
  - ../../applications/flux-monitoring/base
  - ../../applications/external-secrets-operator/base
  - ../../applications/cnpg/base
  - ../../applications/step-ca-db/controlplane
  - ../../applications/step-ca/controlplane
  - ../../applications/cert-manager/controlplane
  - ../../applications/cert-manager-approver-policy/controlplane
  - ../../applications/cert-manager-trust-manager/controlplane
  - ../../applications/cert-manager-spiffe-issuer/controlplane
  - ../../applications/cert-manager-spiffe-csi-driver/controlplane
  # M2 step 6: install layer only — ProviderConfigs, EnvironmentConfig,
  # and Roles Anywhere bootstrap land as cluster resources in the next
  # change (providers are Healthy without them).
  - ../../applications/crossplane/base
  - ../../applications/crossplane-providers/family-aws
  - ../../applications/crossplane-providers/provider-aws-route53
  - ../../applications/crossplane-providers/provider-aws-iam
  - ../../applications/crossplane-providers/provider-aws-rolesanywhere
  - ../../applications/crossplane-providers/family-cloudflare
  - ../../applications/crossplane-providers/provider-cloudflare-dns
  - ../../applications/crossplane-providers/provider-cloudflare-zone
  - ../../applications/crossplane-providers/provider-github
  - ../../applications/crossplane-providers/provider-kubernetes
  - ../../applications/crossplane-functions/function-environment-configs
  - ../../applications/crossplane-functions/function-go-templating
  - ../../applications/crossplane-functions/function-auto-ready
  # delegated-hosted-zone-aws XRD deliberately NOT included yet: Crossplane
  # self-installs its own CRDs (CompositeResourceDefinition, Composition,
  # etc.) at runtime — they aren't shipped in the Helm chart (confirmed via
  # `helm template --include-crds`, zero CRDs). Flux dry-runs the whole
  # Kustomization atomically before applying anything, so an XRD in the
  # same apply as a first-time Crossplane install fails dry-run before
  # Crossplane ever starts, blocking the entire Kustomization (hit this
  # 2026-07-20 — 0 pods, 0 CRDs, nothing applied at all). Add this back
  # once Crossplane is confirmed Healthy with its CRDs registered.
  - resources/flux.source.git.yaml
  - resources/flux.kustomization.yaml
  - resources/truenas-csi.api-credentials.sops.yaml
  - resources/external-dns.unifi-credentials.sops.yaml
  - resources/step-ca-intermediate.sops.yaml
  - resources/step-ca-root-cert.yaml

patches:
  - path: patches/envoy-proxy.ipfamily.yaml
    target:
      kind: EnvoyProxy
      name: custom-proxy-config
      namespace: envoy-gateway-system
  - path: patches/step-ca.gateway.yaml
    target:
      kind: Gateway
      name: step-ca
      namespace: step-ca
  - path: patches/step-ca.tls-route.yaml
    target:
      kind: TLSRoute
      name: step-ca
      namespace: step-ca
