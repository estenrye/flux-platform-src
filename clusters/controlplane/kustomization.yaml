apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Baseline for the IPv6-only controlplane cluster (M1 design §7.2). Calico
# first: Talos installs with CNI none, nodes stay NotReady until it lands.
# M2 migration in progress (2026-07-13 design): step-ca stack landed in
# step 3, cert-manager stack in step 4, crossplane in step 6, delegated
# zone claim + ESO 1Password store in step 9.
resources:
  - ../../applications/calico/controlplane
  - ../../applications/global-network-policy-default-deny/controlplane
  - ../../applications/priority-classes
  - ../../applications/prometheus-operator-crds/base
  - ../../applications/reloader/base
  - ../../applications/gateway-api-crds/base
  - ../../applications/envoy-gateway-crds/base
  - ../../applications/envoy-gateway/base
  - ../../applications/external-dns/unifi/base
  - ../../applications/external-dns/cloudflare/controlplane
  - ../../applications/truenas-csi/base
  # M3 step 3: Garage 3-node S3 cluster (50 GiB iSCSI per node). Layout and
  # bucket provisioning handled by the bucket-init job in the controlplane overlay.
  - ../../applications/garage/controlplane
  # M3 step 1: democratic-csi deployed alongside truenas-csi as shadow classes.
  # truenas-csi remains until smoke test confirms democratic-csi-nfs-pg works
  # for CNPG uid 26 without the nfs-pg-owner CronJob (M3 step 2 cutover).
  - ../../applications/democratic-csi/base
  - ../../applications/flux/base
  - ../../applications/flux-monitoring/base
  - ../../applications/external-secrets-operator/base
  - ../../applications/cnpg/base
  # CNPG-I Barman Cloud plugin: replaces the in-tree barmanObjectStore API
  # (deprecated, removed in CNPG 1.31.0; cluster is on 1.30.0). Must come
  # after cnpg/base (shares cnpg-system namespace + depends on the operator
  # being present for the plugin registration Service to matter).
  - ../../applications/cnpg-barman-plugin/base
  - ../../applications/step-ca-db/controlplane
  - ../../applications/step-ca/controlplane
  - ../../applications/cert-manager/controlplane
  - ../../applications/cert-manager-approver-policy/controlplane
  - ../../applications/cert-manager-trust-manager/controlplane
  - ../../applications/cert-manager-spiffe-issuer/controlplane
  - ../../applications/cert-manager-spiffe-csi-driver/controlplane
  # M3 step 5: OpenBao HA on a CNPG/PostgreSQL backend (not integrated
  # Raft — see docs/memory/m3-step-tracker.md). openbao-db must come
  # first (CNPG cluster + barman plugin wiring, same pattern as
  # step-ca-db). OpenBao's server TLS is a real cert-manager Certificate
  # issued by csi-driver-spiffe-ca (SPIFFE CSI itself was tried first but
  # doesn't support DNS SANs — see memory); cert-manager-spiffe-csi-driver
  # above is still a prerequisite for other apps, not for this one.
  - ../../applications/openbao-db/controlplane
  - ../../applications/openbao/base
  # M2 step 6 crossplane install (2026-07-20): four ordered Flux
  # Kustomizations (crossplane-core -> crossplane-providers ->
  # crossplane-xrds -> crossplane-resources,
  # resources/flux.crossplane-*.kustomization.yaml) replace direct
  # inclusion here. Crossplane, its providers, and its XRDs all
  # self-install their own CRDs at runtime — a single flat apply raced
  # dry-run validation against CRDs that didn't exist yet on first
  # bootstrap. See docs/memory/crossplane-bootstrap-phasing.md and the
  # ADR-10 amendment.
  - resources/flux.source.git.yaml
  - resources/flux.kustomization.yaml
  - resources/flux.crossplane-core.kustomization.yaml
  - resources/flux.crossplane-providers.kustomization.yaml
  - resources/flux.crossplane-xrds.kustomization.yaml
  - resources/flux.crossplane-resources.kustomization.yaml
  # ARNs only, not credentials — generated by
  # .bin/deploy-aws-roles-anywhere.sh, consumed via postBuild.substituteFrom
  # on flux.crossplane-providers.kustomization.yaml.
  - resources/roles-anywhere-arns.yaml
  # ESO -> 1Password wiring (M2 step 9): SDK token bootstrapped via
  # .bin/bootstrap-cluster-secret-store.sh into the dedicated "controlplane"
  # 1Password vault, ClusterSecretStore pointed at it, ExternalSecrets pull
  # the shared github-auth-app/cloudflare-api-token items (same 1Password
  # item paths as the crossplane cluster's, just a different vault).
  - resources/eso.service-account-secret.yaml
  - resources/eso.cluster-secret-store.yaml
  # M3 step 6: github-token/cloudflare-creds below now source from this
  # store instead of 1password-sdk. OpenBao's own kv-v2/kubernetes-auth/
  # policy/role config lives outside GitOps — OpenBao has no CRD surface —
  # see .bin/configure-openbao-crossplane-secrets.sh.
  - resources/eso.cluster-secret-store.openbao.yaml
  - resources/eso.external-secret.github.yaml
  - resources/eso.external-secret.cloudflare.yaml
  # Public DNS (M2 §4.5): publishes ca.rye.ninja's AAAA into the
  # Cloudflare-hosted rye.ninja zone. Separate from
  # eso.external-secret.cloudflare.yaml above, which feeds Crossplane's
  # provider-cloudflare, not external-dns.
  - resources/eso.external-secret.cloudflare-dns.yaml
  - resources/truenas-csi.api-credentials.sops.yaml
  # democratic-csi driver config secrets (M3 step 1): SOPS-encrypted YAML
  # blobs containing TrueNAS API key + ZFS dataset paths + NFS/iSCSI settings.
  # Created by: CLUSTER=controlplane NFS_SERVER_ULA=<ula> make provision-democratic-csi
  - resources/democratic-csi-nfs.driver-config.sops.yaml
  - resources/democratic-csi-iscsi.driver-config.sops.yaml
  - resources/external-dns.unifi-credentials.sops.yaml
  - resources/step-ca-intermediate.sops.yaml
  - resources/step-ca-root-cert.yaml
  - secrets/cloudflare-r2-openbao-snapshots.sops.yaml
  # Garage RPC secret + admin token (M3 step 3). Break-glass; to be rotated
  # into OpenBao once step 5 completes. See A2 in the M3 design spec.
  - secrets/garage-admin.sops.yaml
  # Garage S3 access key for step-ca-db barman WAL archiving (M3 step 4).
  - secrets/step-ca-db-barman-credentials.sops.yaml
  # Garage S3 access key for openbao-db barman WAL archiving (M3 step 5).
  - secrets/openbao-db-barman-credentials.sops.yaml

patches:
  - path: patches/envoy-proxy.ipfamily.yaml
    target:
      kind: EnvoyProxy
      name: custom-proxy-config
      namespace: envoy-gateway-system
  - path: patches/step-ca.gateway.yaml
    target:
      kind: Gateway
      name: step-ca
      namespace: step-ca
  - path: patches/step-ca.tls-route.yaml
    target:
      kind: TLSRoute
      name: step-ca
      namespace: step-ca
