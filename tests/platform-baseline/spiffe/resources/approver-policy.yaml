# Workload SVID CertificateRequests are not auto-approved on this platform;
# each consumer needs a CertificateRequestPolicy (same pattern as
# tests/step-ca). Scoped to the baseline test's service account via the URI
# SAN; trust-domain wildcard keeps it portable across clusters.
apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: platform-baseline-spiffe
spec:
  allowed:
    isCA: false
    uris:
      values:
        - "spiffe://*/ns/*/sa/spiffe-baseline"
    usages:
      - digital signature
      - key encipherment
      - server auth
      - client auth
  selector:
    issuerRef:
      group: cert-manager.io
      kind: ClusterIssuer
      name: csi-driver-spiffe-ca
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cert-manager-policy:platform-baseline-spiffe
rules:
  - apiGroups: ["policy.cert-manager.io"]
    resources: ["certificaterequestpolicies"]
    verbs: ["use"]
    resourceNames: ["platform-baseline-spiffe"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cert-manager-policy:platform-baseline-spiffe
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cert-manager-policy:platform-baseline-spiffe
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
