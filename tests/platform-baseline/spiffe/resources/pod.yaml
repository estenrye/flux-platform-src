apiVersion: v1
kind: Pod
metadata:
  name: spiffe-baseline
  labels:
    app: spiffe-baseline
spec:
  restartPolicy: Never
  serviceAccountName: spiffe-baseline
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 2000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: workload
      image: busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
      command: ["sleep", "600"]
      volumeMounts:
        - mountPath: /var/run/secrets/spiffe.io
          name: spiffe
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      resources:
        limits:
          cpu: 10m
          memory: 20Mi
        requests:
          cpu: 10m
          memory: 20Mi
  volumes:
    - name: spiffe
      csi:
        driver: spiffe.csi.cert-manager.io
        readOnly: true
        volumeAttributes:
          # SVID files are root-owned by default; make them readable by the
          # pod's runAsGroup.
          spiffe.csi.cert-manager.io/fs-group: "2000"
