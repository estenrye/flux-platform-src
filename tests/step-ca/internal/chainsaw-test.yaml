apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: step-ca-internal
spec:
  steps:
    - name: apply-approver-policy
      try:
        - apply:
            file: resources/approver-policy.yaml

    - name: create-test-cert
      try:
        - apply:
            file: resources/certificate.yaml

    - name: wait-for-cert
      try:
        - assert:
            timeout: 60s
            file: resources/assert-cert-ready.yaml

    - name: setup-network-access
      try:
        - script:
            timeout: 30s
            content: |
              set -e
              export KUBECONFIG=~/.kube/spot/ryezone-labs/crossplane-controlplane-cluster.yaml
              kubectl label namespace ${NAMESPACE} step-ca.io/test-access=true --overwrite
              echo "namespace labeled for step-ca access"
        - apply:
            file: resources/network-policy.yaml

    - name: copy-root-ca-secret
      try:
        - script:
            timeout: 30s
            content: |
              set -e
              export KUBECONFIG=~/.kube/spot/ryezone-labs/crossplane-controlplane-cluster.yaml
              kubectl get secret csi-driver-spiffe-ca -n step-ca \
                -o jsonpath='{.data.tls\.crt}' | base64 -d > /tmp/root-ca-${NAMESPACE}.crt
              kubectl create secret generic root-ca \
                -n ${NAMESPACE} \
                --from-file=tls.crt=/tmp/root-ca-${NAMESPACE}.crt \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "root-ca secret copied to ${NAMESPACE}"

    - name: deploy-test-job
      try:
        - apply:
            file: resources/test-job.yaml

    - name: wait-for-job
      try:
        - assert:
            timeout: 300s
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: step-ca-capability-test
              status:
                succeeded: 1
