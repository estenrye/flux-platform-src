apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: probe-nfs
spec:
  storageClassName: truenas-nfs
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nfs-writer
  labels:
    app: nfs-probe
spec:
  restartPolicy: Never
  containers:
    - name: writer
      image: busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
      command: ["sleep", "1200"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: probe-nfs
---
# Reader forced onto a different node: proves RWX is truly concurrent
# cross-node, not two mounts on one kubelet.
apiVersion: v1
kind: Pod
metadata:
  name: nfs-reader
  labels:
    app: nfs-probe-reader
spec:
  restartPolicy: Never
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: nfs-probe
          topologyKey: kubernetes.io/hostname
  containers:
    - name: reader
      image: busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
      command: ["sleep", "1200"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: probe-nfs
