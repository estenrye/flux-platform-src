apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: baseline-storage
spec:
  description: >-
    TrueNAS-backed storage contract (M1 design §9.2). Gates on truenas-nfs
    (RWX, the default StorageClass): PVC bind + write, online expansion,
    data surviving pod rescheduling to a different node, and truly concurrent
    cross-node RWX.

    truenas-iscsi (RWO block) is intentionally NOT exercised here: it is
    blocked on IPv6-only clusters by an upstream csi-lib-iscsi portal-parsing
    bug (kubernetes-csi/csi-lib-iscsi#94, truenas/truenas-csi#45). Discovery
    and login succeed; only the driver's device-path detection is v4-only.
    democratic-csi handles IPv6 correctly and is the tracked iSCSI fallback.
    Re-add an iSCSI case here once RWO block storage is wired up.
  steps:
    - name: nfs-bind-and-write
      try:
        - apply:
            file: resources/pvc-nfs-pods.yaml
        - assert:
            timeout: 180s
            resource:
              apiVersion: v1
              kind: PersistentVolumeClaim
              metadata:
                name: probe-nfs
              status:
                phase: Bound
        - assert:
            timeout: 180s
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: nfs-writer
              status:
                phase: Running
        - script:
            timeout: 120s
            content: |
              set -eu
              kubectl exec -n "${NAMESPACE}" nfs-writer -- sh -c 'echo "m1-baseline-$(date +%s)" > /data/probe.txt && sync && cat /data/probe.txt'
              echo "OK: NFS volume bound, mounted, writable"
    - name: nfs-rwx-cross-node
      try:
        - assert:
            timeout: 180s
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: nfs-reader
              status:
                phase: Running
        - script:
            timeout: 120s
            content: |
              set -eu
              W_NODE=$(kubectl get pod nfs-writer -n "${NAMESPACE}" -o jsonpath='{.spec.nodeName}')
              R_NODE=$(kubectl get pod nfs-reader -n "${NAMESPACE}" -o jsonpath='{.spec.nodeName}')
              [ "${W_NODE}" != "${R_NODE}" ] || { echo "FAIL: RWX pods landed on the same node"; exit 1; }
              kubectl exec -n "${NAMESPACE}" nfs-writer -- sh -c 'echo rwx-proof > /data/rwx.txt && sync'
              for i in $(seq 1 12); do
                if kubectl exec -n "${NAMESPACE}" nfs-reader -- cat /data/rwx.txt 2>/dev/null | grep -q rwx-proof; then
                  echo "OK: concurrent RWX across ${W_NODE} and ${R_NODE}"
                  exit 0
                fi
                sleep 5
              done
              echo "FAIL: reader never saw the writer's data"
              exit 1
    - name: nfs-online-expand
      try:
        - script:
            timeout: 300s
            content: |
              set -eu
              kubectl patch pvc probe-nfs -n "${NAMESPACE}" --type merge \
                -p '{"spec":{"resources":{"requests":{"storage":"2Gi"}}}}'
              for i in $(seq 1 30); do
                CAP=$(kubectl get pvc probe-nfs -n "${NAMESPACE}" -o jsonpath='{.status.capacity.storage}')
                [ "${CAP}" = "2Gi" ] && { echo "OK: expanded to ${CAP}"; exit 0; }
                sleep 10
              done
              echo "FAIL: PVC never reported 2Gi (last: ${CAP})"
              kubectl describe pvc probe-nfs -n "${NAMESPACE}" | tail -15
              exit 1
    - name: nfs-data-survives-reschedule
      try:
        - script:
            timeout: 300s
            content: |
              set -eu
              MARKER=$(kubectl exec -n "${NAMESPACE}" nfs-writer -- cat /data/probe.txt)
              OLD_NODE=$(kubectl get pod nfs-writer -n "${NAMESPACE}" -o jsonpath='{.spec.nodeName}')
              kubectl delete pod nfs-writer -n "${NAMESPACE}" --wait=true --timeout=120s
              kubectl run nfs-rescheduled -n "${NAMESPACE}" --restart=Never \
                --overrides="{\"spec\":{\"affinity\":{\"nodeAffinity\":{\"requiredDuringSchedulingIgnoredDuringExecution\":{\"nodeSelectorTerms\":[{\"matchExpressions\":[{\"key\":\"kubernetes.io/hostname\",\"operator\":\"NotIn\",\"values\":[\"${OLD_NODE}\"]}]}]}}},\"containers\":[{\"name\":\"r\",\"image\":\"busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e\",\"command\":[\"sleep\",\"300\"],\"volumeMounts\":[{\"name\":\"data\",\"mountPath\":\"/data\"}]}],\"volumes\":[{\"name\":\"data\",\"persistentVolumeClaim\":{\"claimName\":\"probe-nfs\"}}]}}" \
                --image=busybox:1.37.0@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e \
                -- sleep 300
              kubectl wait pod nfs-rescheduled -n "${NAMESPACE}" --for=condition=Ready --timeout=180s \
                || { echo "FAIL: volume never remounted on another node"; kubectl describe pod nfs-rescheduled -n "${NAMESPACE}" | tail -15; exit 1; }
              NEW_NODE=$(kubectl get pod nfs-rescheduled -n "${NAMESPACE}" -o jsonpath='{.spec.nodeName}')
              [ "${NEW_NODE}" != "${OLD_NODE}" ] || { echo "FAIL: rescheduled onto the same node"; exit 1; }
              READ=$(kubectl exec -n "${NAMESPACE}" nfs-rescheduled -- cat /data/probe.txt)
              [ "${READ}" = "${MARKER}" ] || { echo "FAIL: data mismatch after reschedule (${READ} != ${MARKER})"; exit 1; }
              echo "OK: data survived rescheduling ${OLD_NODE} -> ${NEW_NODE}"
        # nfs-rescheduled is created via kubectl run, so chainsaw does not
        # track it for teardown; delete it here so it releases the PVC and
        # step cleanup does not block on the pvc-protection finalizer.
      finally:
        - script:
            content: |
              kubectl delete pod nfs-rescheduled -n "${NAMESPACE}" --wait=false --ignore-not-found
