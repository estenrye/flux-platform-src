apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openbao

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml
  - resources/test-pod-network-policy.yaml
  - resources/certificate.yaml
  - resources/certificate-request-policy.yaml
  - resources/certificate-request-policy-rbac.yaml

helmCharts:
  - name: openbao
    repo: https://openbao.github.io/openbao-helm
    version: 0.28.6
    releaseName: openbao
    namespace: openbao
    includeCRDs: false
    valuesFile: values.yaml

images:
  - name: quay.io/openbao/openbao
    newTag: "2.6.1"
    digest: sha256:5b2486ab0fb90bbc788cc345b0a08616dfb375873ee8be5df3a2fd4d378a67e0

patches:
  - target:
      kind: NetworkPolicy
      name: ^openbao$
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/dangling-networkpolicypeer-podselector: "openbao-db (applications/openbao-db) lives in a sibling Kustomization; not visible when this app renders in isolation, but present in the combined cluster render."

  - target:
      kind: Service
      name: openbao-active|openbao-standby
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/dangling-service: "openbao-active is a runtime-computed pod label (service_registration \"kubernetes\" patches each pod's own openbao-active label based on leader status); no pod carries it in the static rendered manifest."

  - target:
      kind: StatefulSet
      name: openbao
    patch: |-
      - op: add
        path: /metadata/annotations
        value: {}
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
        value: "Single-host homelab cluster; no zone or role topology to express affinity against."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
        value: "Chart ships this disabled by default, deliberately: /v1/sys/health returns 501/503 while uninitialized/sealed, which is a normal, potentially long-lived state pre-unseal-ceremony. A liveness probe there only crash-loops the pod for no benefit."
      - op: add
        path: /metadata/annotations/checkov.io~1skip11
        value: "CKV_K8S_8=Chart ships this disabled by default, deliberately: /v1/sys/health returns 501/503 while uninitialized/sealed (a normal, potentially long-lived pre-unseal-ceremony state); enabling it crash-loops the pod for no benefit."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-rolling-update-strategy
        value: "OnDelete is upstream's recommended strategy for a stateful HA server (openbao-helm docs): avoids automatically cycling multiple replicas during a config/image change; pods are deleted deliberately one at a time."
        # PostgreSQL storage backend note: unlike Raft, Postgres itself
        # already tolerates any single pod restart without data loss, but
        # OnDelete still avoids simultaneous multi-pod churn against the
        # shared HA lock table.
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-read-only-root-fs
        value: "OpenBao writes plugin catalog and runtime state inside the container; readOnlyRootFilesystem is not supported upstream."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1read-secret-from-env-var
        value: "BAO_PG_CONNECTION_URL is OpenBao's documented mechanism for the postgresql storage backend's connection string; no file-based alternative exists upstream."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1env-value-from
        value: "openbao-db-app is CNPG's auto-generated app Secret, created at the cluster level (applications/openbao-db); absent only from this application-level render directory, not from the cluster's actual applied manifest set."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-cpu-requirements
        value: "OpenBao resource envelope to be tuned after M3 baseline data is available."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-memory-requirements
        value: "OpenBao resource envelope to be tuned after M3 baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip01
        value: "CKV_K8S_10=OpenBao resource requests deferred until M3 baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip02
        value: "CKV_K8S_11=OpenBao resource limits deferred until M3 baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip03
        value: "CKV_K8S_12=OpenBao resource requests deferred until M3 baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip04
        value: "CKV_K8S_13=OpenBao resource limits deferred until M3 baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip05
        value: "CKV_K8S_22=OpenBao writes plugin catalog and runtime state; readOnlyRootFilesystem not supported upstream."
      - op: add
        path: /metadata/annotations/checkov.io~1skip06
        value: "CKV_K8S_28=Upstream chart does not drop NET_RAW; no container securityContext.capabilities is set."
      - op: add
        path: /metadata/annotations/checkov.io~1skip07
        value: "CKV_K8S_35=BAO_PG_CONNECTION_URL is OpenBao's documented mechanism for the postgresql storage backend; no file-based alternative exists upstream."
      - op: add
        path: /metadata/annotations/checkov.io~1skip08
        value: "CKV_K8S_37=Upstream chart does not set container securityContext.capabilities."
      - op: add
        path: /metadata/annotations/checkov.io~1skip09
        value: "CKV_K8S_38=service_registration \"kubernetes\" requires the pod's own service account token to patch its openbao-active label."
      - op: add
        path: /metadata/annotations/checkov.io~1skip10
        value: "CKV_K8S_40=UID 100 is upstream's fixed non-root image user; not independently configurable."
      - op: add
        path: /spec/template/spec/restartPolicy
        value: Always

  - target:
      kind: PodDisruptionBudget
      name: openbao
    patch: |-
      - op: add
        path: /spec/unhealthyPodEvictionPolicy
        value: AlwaysAllow

  - target:
      kind: Pod
      name: openbao-server-test
    patch: |-
      - op: add
        path: /metadata/labels
        value:
          helm.sh/hook: test
      - op: add
        path: /spec/automountServiceAccountToken
        value: false
      - op: add
        path: /spec/serviceAccountName
        value: openbao
      - op: add
        path: /spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 100
          seccompProfile:
            type: RuntimeDefault
      - op: add
        path: /spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
        value: "Helm test hook Pod is a short-lived validation job with restartPolicy Never; does not need liveness monitoring."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-readiness-probe
        value: "Helm test hook Pod is a short-lived validation job with restartPolicy Never; does not need readiness gating."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
        value: "Single-host homelab cluster; no zone or role topology to express affinity against."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-read-only-root-fs
        value: "bao CLI writes to its home directory at runtime; readOnlyRootFilesystem is not supported upstream."
      - op: add
        path: /metadata/annotations/checkov.io~1skip1
        value: "CKV_K8S_8=Helm test hook Pod is a short-lived validation job with restartPolicy Never; does not need liveness monitoring."
      - op: add
        path: /metadata/annotations/checkov.io~1skip2
        value: "CKV_K8S_9=Helm test hook Pod is a short-lived validation job with restartPolicy Never; does not need readiness gating."
      - op: add
        path: /metadata/annotations/checkov.io~1skip3
        value: "CKV_K8S_22=bao CLI writes to its home directory at runtime; readOnlyRootFilesystem not supported upstream."
      - op: add
        path: /metadata/annotations/checkov.io~1skip4
        value: "CKV_K8S_40=UID 100 matches the main server image's fixed non-root user."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-cpu-requirements
        value: "Helm test hook Pod is a short-lived validation job; resource envelope not needed."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-memory-requirements
        value: "Helm test hook Pod is a short-lived validation job; resource envelope not needed."
      - op: add
        path: /metadata/annotations/checkov.io~1skip5
        value: "CKV_K8S_10=Helm test hook Pod is a short-lived validation job; resource requests not needed."
      - op: add
        path: /metadata/annotations/checkov.io~1skip6
        value: "CKV_K8S_11=Helm test hook Pod is a short-lived validation job; resource limits not needed."
      - op: add
        path: /metadata/annotations/checkov.io~1skip7
        value: "CKV_K8S_12=Helm test hook Pod is a short-lived validation job; resource requests not needed."
      - op: add
        path: /metadata/annotations/checkov.io~1skip8
        value: "CKV_K8S_13=Helm test hook Pod is a short-lived validation job; resource limits not needed."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1restart-policy
        value: "Helm test hook Pod is a bare Pod (not a Job/Deployment); restartPolicy Never is correct — it should run once and stop, not restart on completion."
