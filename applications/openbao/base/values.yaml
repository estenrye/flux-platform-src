global:
  enabled: true
  tlsDisable: false

injector:
  enabled: false

server:
  enabled: true

  image:
    registry: quay.io
    repository: openbao/openbao
    tag: "2.6.1"

  updateStrategyType: "OnDelete"
  configAnnotation: true

  # M3 step 5: PostgreSQL (CNPG-backed) storage instead of integrated Raft.
  # OpenBao's HA-over-Postgres coordinates leader election via a dedicated
  # lock table (openbao_ha_locks) — no raft peer discovery needed, every
  # pod points at the same CNPG primary. connection_url is intentionally
  # NOT in this HCL: OpenBao reads it from BAO_PG_CONNECTION_URL (below),
  # sourced from CNPG's auto-generated app Secret. No credentials land in
  # a rendered manifest.
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: false
    config: |
      ui = true

      listener "tcp" {
        address       = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file = "/openbao/tls/tls.crt"
        tls_key_file  = "/openbao/tls/tls.key"
      }

      storage "postgresql" {
        ha_enabled = "true"
      }

      service_registration "kubernetes" {}

      # OpenBao no longer allows `bao audit enable` over the API (a
      # deliberate security change — audit devices of type file/socket can
      # write to arbitrary paths, so the API is disabled and only the
      # server's own config file can declare one). See
      # https://openbao.org/docs/configuration/audit/. Declared here,
      # applied on next process start (OnDelete strategy — needs a manual
      # `kubectl delete pod` per replica to pick it up).
      audit "file" "to-stdout" {
        options {
          file_path = "stdout"
        }
      }

  extraSecretEnvironmentVars:
    - envName: BAO_PG_CONNECTION_URL
      secretName: openbao-db-app
      secretKey: uri

  # Chart ships this disabled by default, deliberately: confirmed live
  # that enabling it crash-loops the pod while sealed/uninitialized
  # (/v1/sys/health returns 501 pre-init, 503 while sealed — both read
  # as failure by kubelet's httpGet probe). Sealed is a normal, expected,
  # potentially long-lived state until the [H] unseal ceremony; a
  # liveness probe that kills the container there provides no benefit
  # (restarting doesn't unseal it) and only adds churn. Leave disabled.
  livenessProbe:
    enabled: false

  # No local PVCs — CNPG/Postgres is the store.
  dataStorage:
    enabled: false

  # Audit device gets enabled post-unseal via `bao audit enable file
  # file_path=stdout` (the [H] unseal-ceremony step), not a manifest.
  auditStorage:
    enabled: false

  # TLS: a real cert-manager Certificate (resources/certificate.yaml),
  # NOT the SPIFFE CSI ephemeral volume. Confirmed live: this cluster's
  # csi-driver-spiffe-approver issues SPIFFE-CSI certs with a SPIFFE URI
  # SAN *only* — no DNS names are ever included, regardless of the
  # csi.cert-manager.io/dns-names annotation (that mechanism is for
  # SPIFFE-aware peer verification, not standard hostname-based TLS,
  # which is what the bao CLI / any Go http client does). A static
  # Certificate issued by the same csi-driver-spiffe-ca ClusterIssuer
  # (still no new CA to distribute — already trusted platform-wide via
  # the trust-manager Bundle) with explicit dnsNames is the right tool.
  volumes:
    - name: server-tls
      secret:
        secretName: openbao-server-tls

  volumeMounts:
    - name: server-tls
      mountPath: /openbao/tls
      readOnly: true
