global:
  enabled: true
  tlsDisable: false

injector:
  enabled: false

server:
  enabled: true

  image:
    registry: quay.io
    repository: openbao/openbao
    tag: "2.6.1"

  updateStrategyType: "OnDelete"
  configAnnotation: true

  # M3 step 5: PostgreSQL (CNPG-backed) storage instead of integrated Raft.
  # OpenBao's HA-over-Postgres coordinates leader election via a dedicated
  # lock table (openbao_ha_locks) — no raft peer discovery needed, every
  # pod points at the same CNPG primary. connection_url is intentionally
  # NOT in this HCL: OpenBao reads it from BAO_PG_CONNECTION_URL (below),
  # sourced from CNPG's auto-generated app Secret. No credentials land in
  # a rendered manifest.
  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: false
    config: |
      ui = true

      listener "tcp" {
        address       = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file = "/openbao/tls/tls.crt"
        tls_key_file  = "/openbao/tls/tls.key"
      }

      storage "postgresql" {
        ha_enabled = "true"
      }

      service_registration "kubernetes" {}

  extraSecretEnvironmentVars:
    - envName: BAO_PG_CONNECTION_URL
      secretName: openbao-db-app
      secretKey: uri

  # Chart ships this disabled by default, deliberately: confirmed live
  # that enabling it crash-loops the pod while sealed/uninitialized
  # (/v1/sys/health returns 501 pre-init, 503 while sealed — both read
  # as failure by kubelet's httpGet probe). Sealed is a normal, expected,
  # potentially long-lived state until the [H] unseal ceremony; a
  # liveness probe that kills the container there provides no benefit
  # (restarting doesn't unseal it) and only adds churn. Leave disabled.
  livenessProbe:
    enabled: false

  # No local PVCs — CNPG/Postgres is the store.
  dataStorage:
    enabled: false

  # Audit device gets enabled post-unseal via `bao audit enable file
  # file_path=stdout` (the [H] unseal-ceremony step), not a manifest.
  auditStorage:
    enabled: false

  # SPIFFE CSI ephemeral volume: automatically issued AND automatically
  # approved by the dedicated cert-manager-csi-driver-spiffe-approver
  # (separate from the generic cert-manager-approver-policy system) —
  # no Certificate/CertificateRequestPolicy/RBAC needed. Chains to
  # csi-driver-spiffe-ca, already trusted platform-wide via the
  # trust-manager Bundle.
  volumes:
    - name: spiffe
      csi:
        driver: spiffe.csi.cert-manager.io
        readOnly: true

  volumeMounts:
    - name: spiffe
      mountPath: /openbao/tls
      readOnly: true

  # Both long (FQDN) and short forms are needed: BAO_CLUSTER_ADDR
  # (pod-to-pod HA coordination) and VAULT_ADDR (helm test hook, and
  # anything using the chart's own conventions) use the short
  # <name>.<namespace>.svc / <pod>.openbao-internal forms, not the FQDN.
  # Confirmed live: a cert covering only the FQDN form fails TLS
  # hostname verification against openbao.openbao.svc.
  annotations:
    csi.cert-manager.io/dns-names: "openbao.openbao.svc.cluster.local,openbao.openbao.svc,${POD_NAME}.openbao-internal.openbao.svc.cluster.local,${POD_NAME}.openbao-internal"
