# Helm test hook Pod (openbao-server-test) needs egress to poll `bao
# status` against the openbao Service. Matches the openbao/resources/
# network-policy.yaml ingress rule added for helm.sh/hook: test pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openbao-server-test
  namespace: openbao
spec:
  podSelector:
    matchLabels:
      helm.sh/hook: test
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
