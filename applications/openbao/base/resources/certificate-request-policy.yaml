# cert-manager-approver-policy is cluster-wide; any CertificateRequest
# sits WaitingForApproval forever unless a CertificateRequestPolicy
# matches it. Mirrors applications/cnpg-barman-plugin's
# certificate-request-policy.yaml pattern exactly.
apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: openbao-server-policy
spec:
  allowed:
    commonName:
      required: true
      value: openbao.openbao.svc.cluster.local
    dnsNames:
      required: true
      values:
        - openbao.openbao.svc.cluster.local
        - openbao.openbao.svc
        - openbao-0.openbao-internal.openbao.svc.cluster.local
        - openbao-0.openbao-internal
        - openbao-1.openbao-internal.openbao.svc.cluster.local
        - openbao-1.openbao-internal
        - openbao-2.openbao-internal.openbao.svc.cluster.local
        - openbao-2.openbao-internal
    usages:
      - server auth
      - client auth
  selector:
    issuerRef:
      group: cert-manager.io
      kind: ClusterIssuer
      name: csi-driver-spiffe-ca
    namespace:
      matchNames:
        - openbao
