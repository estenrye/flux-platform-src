# The SPIFFE CSI driver authenticates as the mounting pod's own
# ServiceAccount when it creates the CertificateRequest on that pod's
# behalf — it needs create permission in the pod's namespace. Mirrors
# applications/example-app-spiffe-csi/resources/role.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-spiffe-csi
  namespace: openbao
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-spiffe-csi
  namespace: openbao
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-spiffe-csi
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: openbao
