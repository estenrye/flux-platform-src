# Real cert-manager Certificate (not the SPIFFE CSI ephemeral volume —
# see the comment in ../values.yaml server.volumes for why). Issued by
# the same csi-driver-spiffe-ca ClusterIssuer used elsewhere on this
# platform, so no new CA needs distributing: it's already trusted
# cluster-wide via the trust-manager Bundle
# (ryezone-labs-intermediate-controlplane -> intermediate.crt ConfigMap
# in every namespace).
#
# One shared cert for all 3 replicas, covering every hostname any client
# (the bao CLI, the helm test hook, pod-to-pod HA coordination) actually
# connects with — both FQDN and short forms, confirmed live that only
# the FQDN form was insufficient (short forms are what the chart's own
# env vars use).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-server
  namespace: openbao
spec:
  commonName: openbao.openbao.svc.cluster.local
  dnsNames:
    - openbao.openbao.svc.cluster.local
    - openbao.openbao.svc
    - openbao-0.openbao-internal.openbao.svc.cluster.local
    - openbao-0.openbao-internal
    - openbao-1.openbao-internal.openbao.svc.cluster.local
    - openbao-1.openbao-internal
    - openbao-2.openbao-internal.openbao.svc.cluster.local
    - openbao-2.openbao-internal
  duration: 2160h
  renewBefore: 360h
  isCA: false
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: csi-driver-spiffe-ca
  secretName: openbao-server-tls
  usages:
    - server auth
    - client auth
