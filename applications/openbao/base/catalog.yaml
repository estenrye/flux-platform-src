apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openbao
  description: |-
    OpenBao HA secret store (M3 step 5), backed by CNPG/PostgreSQL
    (applications/openbao-db) rather than integrated Raft storage. TLS via
    the SPIFFE CSI driver; SOPS-encrypted unseal keys; ESO
    ClusterSecretStore consumer (step 6).
  tags:
    - secrets
    - platform
    - infrastructure
spec:
  type: service
  lifecycle: pre-production
  owner: platform-engineering
