apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: aws-iam-admin-provider
  namespace: crossplane-system
spec:
  deploymentTemplate:
    spec:
      selector:
        matchLabels:
          app: upbound-provider-aws-iam
      template:
        metadata:
          labels:
            app: upbound-provider-aws-iam
        spec:
          securityContext:
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
            fsGroup: 2000
          serviceAccountName: aws-iam-admin-provider
          containers:
            - name: package-runtime
              env:
                - name: AWS_REGION
                  value: us-east-2
                - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
                  value: http://localhost:9911
            - name: aws-signing-helper
              image: public.ecr.aws/rolesanywhere/credential-helper:1.8.1-2026.04.09.16.01
              command:
                - aws_signing_helper
                - serve
                - --port
                - "9911"
                - --debug
                - --certificate
                - /var/run/secrets/spiffe.io/tls.crt
                - --private-key
                - /var/run/secrets/spiffe.io/tls.key
                - --intermediates
                - /var/run/configmaps/trust-bundle/intermediate.crt
                - --trust-anchor-arn
                # controlplane-Trust-Anchor (cd5fb251-...), created 2026-07-16 by the
                # generalized .bin/deploy-aws-roles-anywhere.sh stack, registered with
                # the current ryezone-labs Root CA. The previous value here
                # (1433b5ab-..., "crossplane-provider-trust-anchor") was a stale
                # pre-generalization trust anchor from April, registered with the old
                # csi-driver-spiffe-ca self-signed cert — every CreateSession failed
                # 403 "Untrusted signing certificate" against it (found 2026-07-20).
                - arn:aws:rolesanywhere:us-east-2:832767337984:trust-anchor/cd5fb251-c748-4b08-8f94-d58dcaab0178
                - --profile-arn
                - arn:aws:rolesanywhere:us-east-2:832767337984:profile/d290a033-f4c3-4942-a56e-7829e8b7c014
                - --role-arn
                - arn:aws:iam::832767337984:role/controlplane-IAM-Admin-crossplane-provider-iam-admin
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 9911
                  name: imdsv2
                  protocol: TCP
              volumeMounts:
                - mountPath: "/var/run/secrets/spiffe.io"
                  name: spiffe
                - mountPath: "/var/run/configmaps/trust-bundle"
                  name: trust-bundle
          volumes:
            - name: spiffe
              csi:
                driver: spiffe.csi.cert-manager.io
                readOnly: true
            - name: trust-bundle
              configMap:
                name: ryezone-labs-intermediate-controlplane
