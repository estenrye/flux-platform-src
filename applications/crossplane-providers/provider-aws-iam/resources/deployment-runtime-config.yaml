apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: aws-iam-admin-provider
  namespace: crossplane-system
spec:
  deploymentTemplate:
    spec:
      selector:
        matchLabels:
          app: upbound-provider-aws-iam
      template:
        metadata:
          labels:
            app: upbound-provider-aws-iam
        spec:
          securityContext:
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
            fsGroup: 2000
          serviceAccountName: aws-iam-admin-provider
          containers:
            - name: package-runtime
              env:
                - name: AWS_REGION
                  value: us-east-2
                - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
                  value: http://localhost:9911
            - name: aws-signing-helper
              image: public.ecr.aws/rolesanywhere/credential-helper:1.8.1-2026.04.09.16.01
              command:
                - aws_signing_helper
                - serve
                - --port
                - "9911"
                - --debug
                - --certificate
                - /var/run/secrets/spiffe.io/tls.crt
                - --private-key
                - /var/run/secrets/spiffe.io/tls.key
                - --intermediates
                - /var/run/configmaps/trust-bundle/intermediate.crt
                - --trust-anchor-arn
                - arn:aws:rolesanywhere:us-east-2:832767337984:trust-anchor/1433b5ab-1a7a-4134-9d84-baa79f94d093
                - --profile-arn
                # Bootstrap required: create an IAM Roles Anywhere profile that references
                # the crossplane-provider-iam-admin role, then replace the placeholder below.
                - arn:aws:rolesanywhere:us-east-2:832767337984:profile/45707742-288a-4a1d-86c2-171c8f2ca580
                - --role-arn
                # Bootstrap required: create an IAM role named crossplane-provider-iam-admin
                # with permissions to manage IAM roles/policies and Roles Anywhere profiles,
                # then replace the placeholder below.
                - arn:aws:iam::832767337984:role/crossplane-provider-iam-admin
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 9911
                  name: imdsv2
                  protocol: TCP
              volumeMounts:
                - mountPath: "/var/run/secrets/spiffe.io"
                  name: spiffe
                - mountPath: "/var/run/configmaps/trust-bundle"
                  name: trust-bundle
          volumes:
            - name: spiffe
              csi:
                driver: spiffe.csi.cert-manager.io
                readOnly: true
            - name: trust-bundle
              configMap:
                name: ryezone-labs-intermediate-controlplane
