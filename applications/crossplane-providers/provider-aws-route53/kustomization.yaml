apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./resources/provider.yaml
  - ./resources/service-account.yaml
  - ./resources/role-binding.yaml
  - ./resources/deployment-runtime-config.yaml
  # cluster-provider-config.yaml deliberately not included here — it's
  # applied by the crossplane-resources Flux Kustomization instead, gated
  # on this provider being Healthy (docs/memory/crossplane-bootstrap-phasing.md).
  - ./resources/network-policy.yaml
