apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: upbound-provider-aws-route53-allow-egress
  namespace: crossplane-system
spec:
  podSelector:
    matchLabels:
      pkg.crossplane.io/provider: upbound-provider-aws-route53
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: upbound-provider-aws-route53-allow-ingress
  namespace: crossplane-system
spec:
  ingress:
  - ports:
    - port: webhook
      protocol: TCP
    - port: metrics
      protocol: TCP
  podSelector:
    matchLabels:
      pkg.crossplane.io/provider: upbound-provider-aws-route53
  policyTypes:
  - Ingress