apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: aws-rolesanywhere-admin-provider
  namespace: crossplane-system
spec:
  deploymentTemplate:
    spec:
      selector:
        matchLabels:
          app: upbound-provider-aws-rolesanywhere
      template:
        metadata:
          labels:
            app: upbound-provider-aws-rolesanywhere
        spec:
          securityContext:
            runAsGroup: 2000
            runAsNonRoot: true
            runAsUser: 2000
            fsGroup: 2000
          serviceAccountName: aws-rolesanywhere-admin-provider
          containers:
            - name: package-runtime
              env:
                - name: AWS_REGION
                  value: us-east-2
                - name: AWS_EC2_METADATA_SERVICE_ENDPOINT
                  value: http://localhost:9911
            - name: aws-signing-helper
              image: public.ecr.aws/rolesanywhere/credential-helper:1.8.1-2026.04.09.16.01
              command:
                - aws_signing_helper
                - serve
                - --port
                - "9911"
                - --debug
                - --certificate
                - /var/run/secrets/spiffe.io/tls.crt
                - --private-key
                - /var/run/secrets/spiffe.io/tls.key
                - --intermediates
                - /var/run/configmaps/trust-bundle/intermediate.crt
                # ARNs are cluster-specific — supplied at reconcile time via
                # Flux postBuild.substituteFrom (resources/roles-anywhere-arns.yaml,
                # generated by .bin/deploy-aws-roles-anywhere.sh), not hardcoded.
                - --trust-anchor-arn
                - ${AWS_ROLESANYWHERE_TRUST_ANCHOR_ARN}
                - --profile-arn
                - ${AWS_ROLESANYWHERE_ADMIN_PROFILE_ARN}
                - --role-arn
                - ${AWS_ROLESANYWHERE_ADMIN_ROLE_ARN}
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 9911
                  name: imdsv2
                  protocol: TCP
              volumeMounts:
                - mountPath: "/var/run/secrets/spiffe.io"
                  name: spiffe
                - mountPath: "/var/run/configmaps/trust-bundle"
                  name: trust-bundle
          volumes:
            - name: spiffe
              csi:
                driver: spiffe.csi.cert-manager.io
                readOnly: true
            - name: trust-bundle
              configMap:
                name: ryezone-labs-intermediate-controlplane
