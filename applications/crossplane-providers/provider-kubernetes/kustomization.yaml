apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - resources/provider.yaml
  - resources/network-policy.yaml
  - resources/provider-runtime-config.yaml
  - resources/cluster-role-binding.yaml
  # provider-config.in-cluster.yaml deliberately not included here — it's
  # applied by the crossplane-resources Flux Kustomization instead, gated
  # on this provider being Healthy (docs/memory/crossplane-bootstrap-phasing.md).

