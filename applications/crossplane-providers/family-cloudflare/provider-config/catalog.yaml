apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: crossplane-provider-cloudflare-config
  description: |-
    ClusterProviderConfig for the Crossplane Cloudflare provider, split
    into its own directory so it can be applied by the
    crossplane-resources Flux Kustomization once the provider itself is
    Healthy (docs/memory/crossplane-bootstrap-phasing.md).
  tags:
    - crossplane
    - crossplane-provider
    - cloudflare
spec:
  type: operator
  lifecycle: production
  owner: platform-engineering
  subcomponentOf: crossplane-provider-cloudflare
