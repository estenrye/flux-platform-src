apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# controlplane overlay: bucket init job runs after StatefulSet deploys.
# The job assigns node layout (3 zones × 45 GiB) and creates the 4 buckets.
# Access keys for consuming services (barman, openbao) are created per step:
#   Step 4: kubectl exec -n garage garage-0 -- garage key create barman-step-ca-db
#   Step 7: kubectl exec -n garage garage-0 -- garage key create openbao-snapshots

resources:
  - ../base
  - resources/bucket-init-job.yaml
  - resources/bucket-init-network-policy.yaml
