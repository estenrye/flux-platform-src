apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: garagenodes.deuxfleurs.fr
spec:
  group: deuxfleurs.fr
  names:
    kind: GarageNode
    listKind: GarageNodeList
    plural: garagenodes
    singular: garagenode
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [hostname, address, port]
            properties:
              hostname:
                type: string
              address:
                type: string
              port:
                type: integer
                minimum: 0
                maximum: 65535
    subresources: {}
