apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: garage
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "lmdb"
    replication_factor = 3
    rpc_bind_addr = "[::]:3901"
    rpc_secret_file = "/var/secrets/rpc-secret"

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token_file = "/var/secrets/admin-token"

    [kubernetes_discovery]
    namespace = "garage"
    service_name = "garage-headless"
    skip_crd = true
