apiVersion: v1
kind: ServiceAccount
metadata:
  name: garage
  namespace: garage
---
# Garage uses kubernetes_discovery to find peer nodes via the K8s API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-discovery
  namespace: garage
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-discovery
  namespace: garage
subjects:
- kind: ServiceAccount
  name: garage
  namespace: garage
roleRef:
  kind: Role
  name: garage-discovery
  apiGroup: rbac.authorization.k8s.io
