apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Garage v2.3.0: 3-node S3-compatible object store (M3 step 3).
# Deployed via the official upstream Helm chart (script/helm/garage@main-v2,
# chart 0.9.3). Volumes on democratic-csi-iscsi: 1 GiB meta + 50 GiB data per
# node. Kubernetes discovery via GarageNode CRDs (kubernetesSkipCrd=false;
# chart ClusterRole lets Garage self-install the CRD at startup).
# RPC secret + admin token from SOPS-encrypted Secret at
# clusters/controlplane/secrets/garage-admin.sops.yaml.
#
# Buckets: step-ca-db-barman, openbao-snapshots, lgtm (reserved), jwks (reserved).
# Layout + bucket provisioning: applications/garage/controlplane/resources/bucket-init-job.yaml.

helmGlobals:
  chartHome: charts

helmCharts:
- name: garage
  releaseName: garage
  namespace: garage
  valuesFile: values.yaml

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml
  - resources/admin-service.yaml

patches:
  # Fix secret key name: our SOPS secret uses rpc-secret but the chart init
  # container reads rpcSecret. Patch until the secret can be re-encrypted.
  - target:
      kind: StatefulSet
      name: garage
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: garage
      spec:
        template:
          spec:
            initContainers:
            - name: garage-init
              env:
              - name: RPC_SECRET
                valueFrom:
                  secretKeyRef:
                    name: garage-secrets
                    key: rpc-secret
  # Linter suppressions on the chart-generated StatefulSet.
  - target:
      kind: StatefulSet
      name: garage
    patch: |-
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-cpu-requirements
        value: "Garage resource envelope to be tuned after M3 baseline data is available."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-memory-requirements
        value: "Garage resource envelope to be tuned after M3 baseline data is available."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-anti-affinity
        value: "Single-host homelab; all nodes are on one KVM host. Garage handles HA internally."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
        value: "Single-host homelab cluster; no zone or role topology to express affinity against."
      - op: add
        path: /metadata/annotations/checkov.io~1skip01
        value: "CKV_K8S_10=Garage CPU requests deferred until M3 storage baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip02
        value: "CKV_K8S_11=Garage CPU limits deferred until M3 storage baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip03
        value: "CKV_K8S_12=Garage memory requests deferred until M3 storage baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip04
        value: "CKV_K8S_13=Garage memory limits deferred until M3 storage baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip05
        value: "CKV_K8S_38=Service account token required for kubernetes_discovery CRD/node management."
      - op: add
        path: /metadata/annotations/checkov.io~1skip06
        value: "CKV_K8S_43=Image digest pinning deferred; tag-only reference sufficient for homelab."
      - op: add
        path: /metadata/annotations/checkov.io~1skip07
        value: "CKV_K8S_40=UID 1000 is standard non-root; high-UID (>10000) would require upstream Garage changes."
