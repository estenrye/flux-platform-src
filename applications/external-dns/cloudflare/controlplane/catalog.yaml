apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: external-dns-cloudflare-controlplane
  description: |-
    Controlplane variant of external-dns/cloudflare/base: publishes
    public DNS records (e.g. ca.rye.ninja) into the Cloudflare-hosted
    rye.ninja zone. Drops base's Rackspace-Spot-specific node
    affinity/tolerations, which don't apply to Talos nodes.
  tags:
    - certificates
    - crds
    - operators
    - platform
    - infrastructure
spec:
  type: service
  lifecycle: production
  owner: platform-engineering
  subcomponentOf: external-dns-cloudflare
