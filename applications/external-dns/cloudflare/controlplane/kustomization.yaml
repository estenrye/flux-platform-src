apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns

# Independent of ../base: base hardcodes releaseName: external-dns, which
# collides with the already-running external-dns/unifi/base instance in
# this same cluster/namespace (identical Service/ServiceAccount/ClusterRole
# names, and identical app.kubernetes.io/instance pod labels that a
# nameSuffix-only override wouldn't fix, since Helm bakes that label from
# Release.Name at template time). releaseName: external-dns-cloudflare
# below keeps every generated name and selector label distinct.
helmCharts:
  - name: external-dns
    namespace: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns/
    version: 1.20.0
    releaseName: external-dns-cloudflare
    includeCRDs: true
    valuesInline: {}
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: ClusterRole
    path: patches/cluster-role.yaml

resources:
  - resources/network-policy.yaml

images:
  - name: registry.k8s.io/external-dns/external-dns
    digest: sha256:ddc7f4212ed09a21024deb1f470a05240837712e74e4b9f6d1f2632ff10672e7
