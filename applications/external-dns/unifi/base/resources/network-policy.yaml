apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-dns-allow-egress
  namespace: external-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-dns
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443 # UniFi controller API
        # apiserver targetPort — post-DNAT rule, see the Calico DNAT memory
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-dns-allow-ingress
  namespace: external-dns
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-dns
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: http
