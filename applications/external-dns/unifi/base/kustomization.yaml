apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns

# external-dns with the UniFi webhook provider: publishes AAAA records for
# LoadBalancer/Gateway VIPs into the UniFi gateway's LAN DNS (M1 design §7.2).
# The UniFi API key lives in a SOPS-encrypted secret per cluster
# (external-dns-unifi-credentials).

helmCharts:
  - name: external-dns
    namespace: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns/
    version: 1.20.0
    releaseName: external-dns
    includeCRDs: true
    valuesFile: values.yaml

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml

patches:
  - target:
      kind: Deployment
      name: external-dns
    path: patches/deployment.yaml
  - target:
      kind: ClusterRole
      name: external-dns
    path: patches/cluster-role.yaml

images:
  - name: registry.k8s.io/external-dns/external-dns
    digest: sha256:ddc7f4212ed09a21024deb1f470a05240837712e74e4b9f6d1f2632ff10672e7
  - name: ghcr.io/kashalls/external-dns-unifi-webhook
    digest: sha256:7f0ddbbc83a36a2a9d762e25eef9cafcb3adf0493068a27d72ae71087eafe6f0
