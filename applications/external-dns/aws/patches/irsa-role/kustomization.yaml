apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-dns

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: external-dns
    path: ./deployment.yaml
  - target:
      kind: ServiceAccount
      name: external-dns
    path: ./service-account.yaml
