apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trust-manager-allow-egress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app: trust-manager
  policyTypes:
  - Egress
  egress:
  # apiserver targetPort - Calico evaluates egress post-DNAT
  # (docs/memory/calico-networkpolicy-dnat.md). Talos serves the apiserver
  # on 6443; the namespaceSelector rule below cannot match node endpoints.
  - ports:
    - protocol: TCP
      port: 6443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trust-manager-allow-ingress
  namespace: cert-manager
spec:
  ingress:
  - ports:
    - port: webhook
      protocol: TCP
    - port: metrics
      protocol: TCP
  # Allow ingress from kube-system namespace (API server) for webhook validation
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  podSelector:
    matchLabels:
      app: trust-manager
      app.kubernetes.io/instance: trust-manager
      app.kubernetes.io/name: trust-manager
  policyTypes:
  - Ingress