- op: add
  path: /spec/replicas
  value: 3
- op: add
  path: /spec/template/spec/priorityClassName
  value: cicd
- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/strategy
  value:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
- op: add
  path: /spec/template/spec/affinity
  value: {}
- op: add
  path: /spec/template/spec/affinity/nodeAffinity
  value:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        preference:
          matchExpressions:
            - key: servers.ngpc.rxt.io/type
              operator: In
              values:
                - ondemand
- op: add
  path: /spec/template/spec/affinity/podAntiAffinity
  value:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 1
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: "app.kubernetes.io/instance"
                operator: In
                values:
                  - flux-system
          topologyKey: "kubernetes.io/hostname"
- op: add
  path: /spec/template/spec/securityContext/runAsUser
  value: 65532
- op: add
  path: /spec/template/spec/containers/0/securityContext/runAsUser
  value: 65532
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=Flux controllers require the service account token to reconcile Flux resources and manage cluster state."
