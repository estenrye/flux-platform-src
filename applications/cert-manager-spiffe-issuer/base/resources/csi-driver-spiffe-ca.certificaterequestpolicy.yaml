apiVersion: policy.cert-manager.io/v1alpha1
kind: CertificateRequestPolicy
metadata:
  name: csi-driver-spiffe-ca-policy
spec:
  allowed:
    commonName:
      required: true
      value: csi-driver-spiffe-ca
    isCA: true
  selector:
    issuerRef:
      group: cert-manager.io
      kind: ClusterIssuer
      name: selfsigned