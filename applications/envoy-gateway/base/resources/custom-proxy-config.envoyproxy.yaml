apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: custom-proxy-config
  namespace: envoy-gateway-system
spec:
  mergeGateways: true
  # Mitigation for the ingress VIP flakiness root-caused 2026-07-15
  # (docs/memory/vip-renumber-flakiness-investigation.md): Calico advertises
  # a LoadBalancer service's BGP host route from every node regardless of
  # externalTrafficPolicy: Local endpoint locality. This looks like
  # projectcalico/calico#6074/#8162, but those were fixed by v3.25.0/v3.30 —
  # we're already on v3.32.1 and still hit it, and a related report against
  # v3.30.5 (#11540) was closed "not planned", so there's no known-good
  # version to upgrade to. Full node coverage (below) sidesteps the bug
  # instead of fixing it.
  #
  # 6 replicas + required anti-affinity + a control-plane toleration spread
  # one pod onto every node (all 6, not just the 3 workers), so every ECMP
  # next-hop the gateway can pick has a working local kube-proxy redirect.
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 6
        # maxSurge:0/maxUnavailable:1 forces replace-in-place instead of the
        # default surge-then-retire. With replicas == available nodes and
        # required anti-affinity, a surge pod has nowhere to schedule and
        # every rollout deadlocks Pending otherwise (hit this at replicas:3
        # before adding the control-plane toleration below).
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      gateway.envoyproxy.io/owning-gatewayclass: merged-eg
                  topologyKey: kubernetes.io/hostname
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
