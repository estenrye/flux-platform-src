apiVersion: batch/v1
kind: Job
metadata:
  name: envoy-gateway-gateway-helm-certgen
  namespace: envoy-gateway-system
  annotations:
    checkov.io/skip1: "CKV_K8S_38=Envoy Gateway certgen job requires the service account token to create TLS secrets for the Gateway API controller."
    ignore-check.kube-linter.io/no-liveness-probe: "Envoy Gateway certgen is a one-shot job; liveness probes are not applicable."
    ignore-check.kube-linter.io/no-node-affinity: "Envoy Gateway certgen is a one-shot job; node affinity is not required."
    ignore-check.kube-linter.io/no-readiness-probe: "Envoy Gateway certgen is a one-shot job; readiness probes are not applicable."
    ignore-check.kube-linter.io/non-isolated-pod: "Envoy Gateway certgen job requires network access to create TLS secrets for the Gateway API controller."
    ignore-check.kube-linter.io/restart-policy: "Envoy Gateway certgen is a one-shot job; Never restart policy is correct."
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
