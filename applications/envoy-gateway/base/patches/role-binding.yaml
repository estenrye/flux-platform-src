apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: envoy-gateway-gateway-helm-certgen
  namespace: envoy-gateway-system
  annotations:
    checkov.io/skip1: "CKV2_K8S_5=Envoy Gateway certgen job requires access to secrets to create and manage TLS certificates for the Gateway API controller admission webhooks."
    ignore-check.kube-linter.io/access-to-secrets: "Envoy Gateway certgen job requires access to secrets to create and manage TLS certificates for the Gateway API controller admission webhooks."
