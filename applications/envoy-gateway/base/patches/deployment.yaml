- op: add
  path: /spec/strategy
  value:
    type: RollingUpdate
- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=Envoy Gateway controller requires the service account token to manage Gateway API resources."
- op: add
  path: /metadata/annotations/checkov.io~1skip2
  value: "CKV_K8S_22=Envoy Gateway requires a writable filesystem for TLS certificate material and temporary configuration files."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1liveness-port
  value: "Envoy Gateway exposes port 8081 for health checks in the container but does not list it in containerPorts; the probe is correct per upstream chart defaults."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1minimum-three-replicas
  value: "Envoy Gateway controller is a single-instance controller; multiple replicas use active/standby leader election."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
  value: "Envoy Gateway controller runs in a single-zone cluster and does not require node affinity rules."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-read-only-root-fs
  value: "Envoy Gateway requires a writable filesystem for TLS certificate material and temporary configuration files."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1non-isolated-pod
  value: "Envoy Gateway controller requires broad network access to manage Gateway API resources and configure Envoy proxy instances."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1readiness-port
  value: "Envoy Gateway exposes port 8081 for health checks in the container but does not list it in containerPorts; the probe is correct per upstream chart defaults."
- op: add
  path: /spec/template/spec/securityContext
  value:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
