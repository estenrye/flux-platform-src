apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

resources:
  - resources/namespace.yaml

helmCharts:
  - name: cert-manager
    repo: oci://quay.io/jetstack/charts
    version: v1.20.1
    releaseName: cert-manager
    namespace: cert-manager
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: ClusterRoleBinding
    path: patches/cluster-role-binding.yaml
  - target:
      kind: RoleBinding
    path: patches/role-binding.yaml
  - target:
      kind: ClusterRole
    path: patches/cluster-role.yaml

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: cert-manager-cainjector
      namespace: cert-manager
    path: patches/cainjector-health-probes.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: cert-manager
      namespace: cert-manager
    path: patches/controller-health-probes.yaml
