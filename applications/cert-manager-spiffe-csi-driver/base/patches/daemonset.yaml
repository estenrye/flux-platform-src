- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1writable-host-mount
  value: "The cert-manager SPIFFE CSI driver needs to write to the host filesystem to store the SPIFFE socket."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1run-as-non-root
  value: "The cert-manager SPIFFE CSI driver needs to run as root to access the SPIFFE socket and manage certificates."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1privileged-container
  value: "The cert-manager SPIFFE CSI driver requires privileged mode for bidirectional mount propagation to kubelet pods directory."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1privilege-escalation-container
  value: "The cert-manager SPIFFE CSI driver requires CAP_SYS_ADMIN capability for mount operations and cannot restrict privilege escalation."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
  value: "CSI helper sidecars (node-driver-registrar and liveness-probe) intentionally omit container liveness probes; the main CSI driver container exposes /healthz and is the liveness-probed container by design."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-readiness-probe
  value: "CSI helper sidecars (node-driver-registrar and liveness-probe) do not serve pod traffic and do not require readiness probes; readiness is not a functional gate for these sidecars."
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_40=The cert-manager SPIFFE CSI driver DaemonSet must run as root (UID 0) to access host filesystem paths required by the CSI specification."
- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/updateStrategy
  value:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
- op: add
  path: /metadata/annotations/checkov.io~1skip2
  value: "CKV_K8S_38=The SPIFFE CSI driver DaemonSet requires the service account token to provision SPIFFE SVID certificates into pod volumes via the CSI node plugin."
- op: add
  path: /metadata/annotations/checkov.io~1skip3
  value: "CKV_K8S_8=CSI helper sidecars intentionally omit liveness probes; the main cert-manager-csi-driver-spiffe container already exposes and uses /healthz."
- op: add
  path: /metadata/annotations/checkov.io~1skip4
  value: "CKV_K8S_9=CSI helper sidecars (node-driver-registrar) intentionally omit readiness probes; they do not serve pod traffic and readiness is not a functional gate for these sidecars."
- op: add
  path: /metadata/annotations/checkov.io~1skip5
  value: "CKV_K8S_20=The cert-manager-csi-driver-spiffe container requires privileged: true for bidirectional mount propagation; Kubernetes implicitly sets allowPrivilegeEscalation: true for privileged containers and the setting cannot be overridden."
- op: add
  path: /metadata/annotations/checkov.io~1skip6
  value: "CKV_K8S_16=The cert-manager-csi-driver-spiffe container requires privileged: true for bidirectional mount propagation to the kubelet pods directory, as required by the CSI specification."
