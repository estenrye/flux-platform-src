csiDriver:
  name: org.democratic-csi.iscsi

driver:
  # freenas-api-iscsi driver config (TrueNAS URL, API key, zvol parent
  # dataset flash-pool/k8s/controlplane) lives in this SOPS-managed secret.
  existingConfigSecret: truenas-iscsi-driver-config
  config:
    driver: freenas-api-iscsi

storageClasses:
  - name: truenas-iscsi
    defaultClass: true
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4
    mountOptions: []
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

volumeSnapshotClasses: []

controller:
  enabled: true
  rbac:
    enabled: true

node:
  # iSCSI initiator runs on the host via the iscsi-tools Talos extension;
  # the node plugin needs host networking and privileged mounts.
  hostNetwork: true
  hostIPC: true
  driver:
    localtimeEnabled: false
