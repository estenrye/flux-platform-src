- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/template/spec/priorityClassName
  value: platform-critical
- op: add
  path: /spec/updateStrategy
  value:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1privileged-container
  value: "The CSI node plugin requires privileged mode for bidirectional mount propagation into the kubelet pods directory (CSI specification)."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1privilege-escalation-container
  value: "Privileged CSI node containers implicitly allow privilege escalation; the setting cannot be overridden for privileged containers."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1run-as-non-root
  value: "The CSI node plugin must run as root to mount block devices and NFS shares on the host."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1host-network
  value: "The node plugin uses hostNetwork so iSCSI/NFS sessions originate from the node's ULA (required for TrueNAS-side access control and post-DNAT policy)."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1host-ipc
  value: "hostIPC is required by the iSCSI initiator tooling shipped via the Talos iscsi-tools extension."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1writable-host-mount
  value: "The CSI node plugin writes to /var/lib/kubelet to stage and publish volumes (CSI specification)."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1sensitive-host-mounts
  value: "The CSI node plugin mounts host paths (/var/lib/kubelet, /dev, iSCSI state) as required to attach and format volumes."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1drop-net-raw-capability
  value: "Privileged CSI node containers retain default capabilities; capability tuning is not supported by the upstream chart."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
  value: "CSI node helper sidecars (driver-registrar/cleanup) intentionally omit probes; the driver container is health-checked via its gRPC socket."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-readiness-probe
  value: "CSI node components serve no pod traffic; readiness is not a functional gate."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-read-only-root-fs
  value: "The node plugin formats and mounts filesystems, writing device and mount state inside the container."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
  value: "Node plugin daemonset must run on every node by design."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1deprecated-service-account-field
  value: "Upstream chart sets both the legacy serviceAccount and serviceAccountName pod fields; the deprecated field is inert."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1unset-cpu-requirements
  value: "CSI node plugin resource envelopes are pending real usage data from the M1 storage suite; sizing follow-up tracked in the M1 exit checklist."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1unset-memory-requirements
  value: "CSI node plugin resource envelopes are pending real usage data from the M1 storage suite; sizing follow-up tracked in the M1 exit checklist."
