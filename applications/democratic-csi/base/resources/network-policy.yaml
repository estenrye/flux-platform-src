# Controller egress to the TrueNAS API and storage services. Node plugins are
# hostNetwork (NetworkPolicy does not apply to them); the namespace is also
# exempted from the default-deny GlobalNetworkPolicy for that reason — this
# policy documents and constrains the pod-network side regardless.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: democratic-csi-controller-egress
  namespace: democratic-csi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: democratic-csi
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443 # TrueNAS JSON-RPC websocket API
        - protocol: TCP
          port: 80 # TrueNAS API (http fallback)
        - protocol: TCP
          port: 3260 # iSCSI
        - protocol: TCP
          port: 2049 # NFS
        - protocol: TCP
          port: 111 # rpcbind
        - protocol: UDP
          port: 111
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
