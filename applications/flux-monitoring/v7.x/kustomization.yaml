apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: flux-system

helmCharts:
  - name: kube-state-metrics
    repo: oci://ghcr.io/prometheus-community/charts
    version: 2.2.0
    releaseName: flux-state-metrics
    namespace: flux-system
    includeCRDs: true
    valuesFile: values.yaml

transformers:
  - labels.yaml