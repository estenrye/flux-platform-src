apiVersion: v1
kind: ConfigMap
metadata:
  name: nfs-pg-owner-script
  namespace: truenas-csi
data:
  # Workaround for the truenas-csi dataset-root ownership gap (upstream
  # issue drafted in M2): volumes on mapall'd StorageClasses are created
  # with a root:755 dataset root that the mapped user cannot write into.
  # This job chowns the dataset root (non-recursive) to the mapall user
  # via the TrueNAS JSON-RPC API. Retire it when the driver does this at
  # CreateVolume, or when the class moves to democratic-csi.
  nfs-pg-owner.py: |
    import asyncio, json, os, ssl, sys, time, urllib.request

    import websockets

    K8S = "https://kubernetes.default.svc"
    SA = "/var/run/secrets/kubernetes.io/serviceaccount"
    MAP_USER = os.environ.get("MAPALL_USER", "k8s-postgres")
    TRUENAS_URL = os.environ.get("TRUENAS_URL", "wss://nas.rye.ninja/api/current")

    def k8s_get(path):
        with open(f"{SA}/token") as f:
            token = f.read()
        req = urllib.request.Request(K8S + path, headers={"Authorization": f"Bearer {token}"})
        ctx = ssl.create_default_context(cafile=f"{SA}/ca.crt")
        with urllib.request.urlopen(req, context=ctx, timeout=30) as resp:
            return json.load(resp)

    async def main():
        with open("/etc/truenas/api-key") as f:
            api_key = f.read().strip()
        pvs = k8s_get("/api/v1/persistentvolumes")["items"]
        paths = sorted(
            pv["spec"]["csi"]["volumeAttributes"]["nfsPath"]
            for pv in pvs
            if pv["spec"].get("csi", {}).get("driver") == "csi.truenas.io"
            and pv["spec"]["csi"]["volumeAttributes"].get("nfs.mapAllUser") == MAP_USER
            and "nfsPath" in pv["spec"]["csi"]["volumeAttributes"]
        )
        if not paths:
            print(f"no PVs with nfs.mapAllUser={MAP_USER}; nothing to do")
            return

        # NAS serves a self-signed cert until the step-ca-issued one lands (M2).
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE

        async with websockets.connect(TRUENAS_URL, ssl=ctx, max_size=2**24) as ws:
            rid = 0

            async def call(method, params):
                nonlocal rid
                rid += 1
                await ws.send(json.dumps({"jsonrpc": "2.0", "id": rid, "method": method, "params": params}))
                while True:
                    r = json.loads(await ws.recv())
                    if r.get("id") == rid:
                        if "error" in r:
                            raise RuntimeError(f"{method}: {r['error']}")
                        return r["result"]

            async def wait_job(job_id, timeout=60):
                deadline = time.time() + timeout
                while time.time() < deadline:
                    jobs = await call("core.get_jobs", [[["id", "=", job_id]]])
                    state = jobs[0]["state"] if jobs else "?"
                    if state == "SUCCESS":
                        return
                    if state in ("FAILED", "ABORTED", "ERROR"):
                        raise RuntimeError(f"job {job_id} {state}: {jobs[0].get('error')}")
                    await asyncio.sleep(1)
                raise RuntimeError(f"job {job_id} timed out")

            await call("auth.login_with_api_key", [api_key])
            users = await call("user.query", [[["username", "=", MAP_USER]]])
            if not users:
                sys.exit(f"NAS user {MAP_USER} not found — create it (M2 step 3 prerequisite)")
            uid = users[0]["uid"]
            gid = users[0].get("group", {}).get("bsdgrp_gid", uid)

            fixed = skipped = 0
            for path in paths:
                st = await call("filesystem.stat", [path])
                if st["uid"] == uid and st["gid"] == gid:
                    skipped += 1
                    continue
                print(f"chown {uid}:{gid} {path} (was {st['uid']}:{st['gid']})")
                result = await call("filesystem.chown", [{
                    "path": path, "uid": uid, "gid": gid,
                    "options": {"recursive": False},
                }])
                if isinstance(result, int):
                    await wait_job(result)
                fixed += 1
            print(f"done: {fixed} fixed, {skipped} already correct")

    asyncio.run(main())
