- op: add
  path: /metadata/annotations/checkov.io~1skip10
  value: "CKV_K8S_19=hostPID is required to coordinate with the host iSCSI initiator daemon."
- op: add
  path: /metadata/annotations/checkov.io~1skip11
  value: "CKV_K8S_20=Privileged CSI node containers implicitly allow privilege escalation; the setting cannot be overridden."
- op: add
  path: /metadata/annotations/checkov.io~1skip12
