  value: "CKV_K8S_10=CSI node resource requests pending real usage data from the M1 storage suite."
- op: add
  path: /metadata/annotations/checkov.io~1skip04
  value: "CKV_K8S_11=CSI node resource limits pending real usage data from the M1 storage suite."
- op: add
