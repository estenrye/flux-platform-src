- op: add
  path: /metadata/annotations/checkov.io~1skip13
  value: "CKV_K8S_23=The CSI node plugin must run as root to mount block devices and NFS shares."
- op: add
  path: /metadata/annotations/checkov.io~1skip14
  value: "CKV_K8S_28=Privileged CSI node containers retain NET_RAW; capability tuning is not supported upstream."
- op: add
  path: /metadata/annotations/checkov.io~1skip15
  value: "CKV_K8S_29=The CSI node plugin must run as root; pod securityContext is not set in the upstream manifest."
- op: add
  path: /metadata/annotations/checkov.io~1skip16
  value: "CKV_K8S_30=Upstream manifest does not set container securityContext for node plugin sidecars."
- op: add
  path: /metadata/annotations/checkov.io~1skip17
  value: "CKV_K8S_31=Privileged CSI node containers cannot use a confined seccomp profile for mount syscalls."
- op: add
  path: /metadata/annotations/checkov.io~1skip18
  value: "CKV_K8S_35=The TrueNAS API key is consumed via env from the SOPS-managed truenas-api-credentials Secret (upstream pattern); credentials are not hardcoded."
- op: add
  path: /metadata/annotations/checkov.io~1skip19
  value: "CKV_K8S_37=The CSI node plugin requires mount-related capabilities; dropping all is not possible."
- op: add
  path: /metadata/annotations/checkov.io~1skip20
  value: "CKV_K8S_38=The node plugin requires the service account token for CSI node registration."
- op: add
  path: /metadata/annotations/checkov.io~1skip21
  value: "CKV_K8S_40=The CSI node plugin must run as root (UID 0) for host mount operations."
