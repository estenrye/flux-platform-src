apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: step-ca-db
  namespace: step-ca
spec:
  instances: 3

  postgresql:
    parameters:
      max_connections: "100"

  bootstrap:
    initdb:
      database: stepcas
      owner: stepcas

  storage:
    size: 10Gi

  primaryUpdateStrategy: unsupervised

  monitoring:
    enablePodMonitor: true
