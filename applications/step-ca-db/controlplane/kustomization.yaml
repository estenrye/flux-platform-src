apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# controlplane variant: CNPG cluster with barman continuous WAL archiving
# to Garage S3 (M3 step 4). Retired: pg_dump CronJob + NFS PVC (M2 interim).

resources:
  - ../base
  - resources/apiserver-egress-network-policy.yaml
  - resources/barman-network-policy.yaml
  - resources/scheduled-backup.yaml

patches:
  # democratic-csi-nfs-pg: fsGroupPolicy: File handles CNPG uid 26 ownership
  # at mount time. No NAS-side mapall or nfs-pg-owner CronJob needed.
  # imageName pin: prevents the postgres image from floating with the
  # operator's compiled-in default.
  - target:
      kind: Cluster
      name: step-ca-db
      namespace: step-ca
    patch: |-
      - op: add
        path: /spec/storage/storageClass
        value: democratic-csi-nfs-pg
      - op: add
        path: /spec/imageName
        value: ghcr.io/cloudnative-pg/postgresql:18.3@sha256:5e30290fba3d990b08a9caea6ddb49c661ad8246cbb2688adad7e6cc78df6c3f
      - op: add
        path: /spec/backup
        value:
          barmanObjectStore:
            destinationPath: s3://step-ca-db-barman/
            endpointURL: http://garage.garage.svc.cluster.local:3900
            s3Credentials:
              accessKeyId:
                name: step-ca-db-barman-credentials
                key: access-key-id
              secretAccessKey:
                name: step-ca-db-barman-credentials
                key: secret-access-key
            wal:
              compression: gzip
            data:
              compression: gzip
          retentionPolicy: "30d"
          target: primary
