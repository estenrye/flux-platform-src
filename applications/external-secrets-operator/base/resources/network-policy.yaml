apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: external-secrets-operator
  namespace: external-secrets-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: external-secrets
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 10250
  egress:
    - ports:
        - protocol: TCP
          port: 443
        # apiserver targetPort — Calico evaluates egress post-DNAT
        # (docs/memory/calico-networkpolicy-dnat.md). Talos serves the
        # apiserver on 6443; managed clusters (Spot) served it on 443.
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
