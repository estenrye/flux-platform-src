- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/strategy
  value:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
- op: add
  path: /spec/template/spec/containers/0/resources
  value:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
- op: add
  path: /spec/template/spec/containers/0/securityContext
  value:
    runAsNonRoot: true
    runAsUser: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
- op: add
  path: /spec/template/spec/securityContext
  value:
    runAsNonRoot: true
    runAsUser: 10001
    seccompProfile:
      type: RuntimeDefault
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1host-network
  value: "The tigera operator runs with hostNetwork because it must reach the apiserver before any CNI exists — it is the component that installs the CNI."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1minimum-three-replicas
  value: "The tigera operator is a single-instance controller with leader election; replicas are active/standby, not active/active."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
  value: "The tigera operator exposes no HTTP health endpoint; kubelet process supervision is the upstream-supported liveness mechanism."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-readiness-probe
  value: "The tigera operator serves no traffic; readiness is not a functional gate for it."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
  value: "Single-host homelab cluster; no zone or role topology to express affinity against."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1non-isolated-pod
  value: "The operator is hostNetwork (pre-CNI bootstrap); pod-network NetworkPolicy does not apply to it."
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=The tigera operator requires the service account token to install and manage Calico cluster resources."
- op: add
  path: /metadata/annotations/checkov.io~1skip2
  value: "CKV_K8S_8=The tigera operator exposes no HTTP health endpoint; kubelet process supervision is the upstream liveness mechanism."
- op: add
  path: /metadata/annotations/checkov.io~1skip3
  value: "CKV_K8S_9=The tigera operator serves no traffic; readiness is not a functional gate."
- op: add
  path: /metadata/annotations/checkov.io~1skip4
  value: "CKV_K8S_19=The tigera operator runs with hostNetwork because it must reach the apiserver before any CNI exists."
