apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: lb-ingress-gua-routed
spec:
  # Internet-facing LoadBalancer VIPs. Routed, not-on-link (services-network
  # design, 2026-07-15): dedicated /64 carved from the PD's spare space
  # (gua_pd_prefix in providers/kvm/network.yaml), no VLAN, no RA —
  # supersedes lb-ingress-gua (<gua_prefix>:ffff::/112, on-link-carved,
  # client NDP flakiness).
  # GUA RENUMBER: ingress_vip_pool in providers/kvm/network.yaml is a manual
  # pick from gua_pd_prefix, not a formula — update on ISP re-delegation
  # (docs/runbooks/gua-prefix-renumber.md). Calico's IPPool.spec.cidr is
  # immutable, so a future renumber needs a new pool name again (e.g.
  # lb-ingress-gua-routed-2, following the same swap this file replaced).
  cidr: 2607:3640:1064:27f::/112
  allowedUses:
    - LoadBalancer
  # allowedUses:[LoadBalancer] already excludes pod IPAM; "!all()" here would
  # also disqualify the pool for the virtual load-balancer host (VIPs stay
  # pending). Keep all().
  nodeSelector: "all()"
  disabled: false
