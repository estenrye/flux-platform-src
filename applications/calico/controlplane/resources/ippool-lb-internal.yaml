apiVersion: crd.projectcalico.org/v1
kind: IPPool
metadata:
  name: lb-internal-ula
spec:
  # LAN-internal LoadBalancer VIPs (site-stable ULA; never leaves the site —
  # the gateway's outbound BGP prefix filters enforce this).
  cidr: fd97:45c2:b3a1:100:ffff::/112
  allowedUses:
    - LoadBalancer
  # Never used for pod addresses.
  # allowedUses:[LoadBalancer] already excludes pod IPAM; "!all()" here would
  # also disqualify the pool for the virtual load-balancer host (VIPs stay
  # pending). Keep all().
  nodeSelector: "all()"
  disabled: false
