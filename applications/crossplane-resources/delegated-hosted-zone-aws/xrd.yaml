apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: xdelegatedhostedzoneaws.dns.platform.rye.ninja
spec:
  group: dns.platform.rye.ninja
  names:
    kind: XDelegatedHostedZoneAWS
    plural: xdelegatedhostedzoneaws
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              zoneId:
                type: string
                description: "This is the Cloudflare Zone Id that will be used in the Record.dns.upjet-cloudflare.m.upbound.io resource to populate a record of type NS for each nameserver in the status fields of the delegated hosted zone."
              zoneName:
                type: string
                description: "This is the DNS Name of the Zone in Cloudflare the delegated hosted zone is delegated from."
              subdomain:
                type: string
                description: "This is the subdomain under the Cloudflare Zone being delegated to the delegated hosted zone."
              ttl:
                type: integer
                description: "This is the ttl for the Cloudflare NS records. The composite resource should default to a value of 1 for 'automatic'. Otherwise the Value must be between 60 and 86400, with the minimum reduced to 30 for enterprise zones."
                default: 1
                minimum: 1
                maximum: 86400
              delegatedZoneProviderConfigRef:
                type: object
                description: "ProviderConfigReference specifies how the provider that will be used to create, observe, update, and delete the delegated hosted zone should be configured."
                properties:
                  apiVersion:
                    type: string
                    description: "API version of the referenced object."
                  kind:
                    type: string
                    description: "Kind of the referenced object."
                  name:
                    type: string
                    description: "Name of the referenced object."
                required:
                - kind
                - name
              cloudflareProviderConfigRef:
                type: object
                description: "ProviderConfigReference specifies how the provider that will be used to create, observe, update, and delete the Cloudflare NS records should be configured."
                properties:
                  apiVersion:
                    type: string
                    description: "API version of the referenced object."
                  kind:
                    type: string
                    description: "Kind of the referenced object."
                  name:
                    type: string
                    description: "Name of the referenced object."
                required:
                - kind
                - name
              trustAnchorArn:
                type: string
                description: "Optional override for the IAM Roles Anywhere trust anchor ARN. When omitted, the composition reads the shared value from the platform-iam-rolesanywhere EnvironmentConfig. Used in the IAM role trust policy to scope assumption to this trust anchor."
              iamProviderConfigRef:
                type: object
                description: "ProviderConfigReference for the IAM provider. The referenced role must have permissions to create and manage IAM roles, policies, and role-policy attachments."
                properties:
                  apiVersion:
                    type: string
                    description: "API version of the referenced object."
                  kind:
                    type: string
                    description: "Kind of the referenced object."
                  name:
                    type: string
                    description: "Name of the referenced object."
                required:
                - kind
                - name
              rolesAnywhereProviderConfigRef:
                type: object
                description: "ProviderConfigReference for the Roles Anywhere provider. The referenced role must have permissions to create and manage Roles Anywhere profiles."
                properties:
                  apiVersion:
                    type: string
                    description: "API version of the referenced object."
                  kind:
                    type: string
                    description: "Kind of the referenced object."
                  name:
                    type: string
                    description: "Name of the referenced object."
                required:
                - kind
                - name
            required:
            - zoneId
            - zoneName
            - subdomain
            - delegatedZoneProviderConfigRef
            - cloudflareProviderConfigRef
            - iamProviderConfigRef
            - rolesAnywhereProviderConfigRef
          status:
            type: object
            properties:
              nameServers:
                type: array
                description: "The nameservers for the delegated hosted zone."
                items:
                  type: string
              zoneId:
                type: string
                description: "The zone ID of the created delegated hosted zone."
              trustDomain:
                type: string
                description: "The SPIFFE trust domain for this delegation, derived as '${spec.subdomain}.${spec.zoneName}'. Use as the --trust-domain flag value for cert-manager-spiffe-csi-driver and as the basis for IAM Roles Anywhere SPIFFE URI conditions."
              trustAnchorArn:
                type: string
                description: "Resolved IAM Roles Anywhere trust anchor ARN. Sourced from spec.trustAnchorArn when set, otherwise from the platform-iam-rolesanywhere EnvironmentConfig. Included in status so downstream consumers can read all IAM Roles Anywhere credential-helper inputs from a single status block."
              iamRoleArn:
                type: string
                description: "The ARN of the IAM role created for ExternalDNS and cert-manager to assume via IAM Roles Anywhere."
              profileArn:
                type: string
                description: "The ARN of the IAM Roles Anywhere profile created for this delegation."