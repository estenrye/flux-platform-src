apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: delegated-hosted-zone-aws
  labels:
    provider: aws
    service: route53
spec:
  compositeTypeRef:
    apiVersion: dns.platform.rye.ninja/v1alpha1
    kind: XDelegatedHostedZoneAWS

  mode: Pipeline
  pipeline:
  - step: environmentConfigs
    functionRef:
      name: function-environment-configs
    input:
      apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
      kind: Input
      spec:
        environmentConfigs:
        - type: Reference
          ref:
            name: platform-iam-rolesanywhere
        - type: Reference
          ref:
            name: platform-cloudflare

  - step: validate-trust-anchor
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $trustAnchorArn := .observed.composite.resource.spec.trustAnchorArn }}
          {{ if not $trustAnchorArn }}
            {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
            {{ if $environment }}
              {{ $trustAnchorArn = index $environment "trustAnchorArn" }}
            {{ end }}
          {{ end }}
          {{ if not $trustAnchorArn }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: TrustAnchorResolved
              status: "False"
              reason: MissingTrustAnchorArn
              message: "No trustAnchorArn was resolved. Set spec.trustAnchorArn on the claim or define data.trustAnchorArn in the platform-iam-rolesanywhere EnvironmentConfig."
              target: CompositeAndClaim
          {{ else }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: TrustAnchorResolved
              status: "True"
              reason: ResolvedTrustAnchorArn
              message: "A trustAnchorArn was resolved for this claim."
              target: CompositeAndClaim
          {{ end }}

  - step: validate-delegated-zone-provider-config
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $delegatedZoneProviderConfigRef := .observed.composite.resource.spec.delegatedZoneProviderConfigRef }}
          {{ if not $delegatedZoneProviderConfigRef }}
            {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
            {{ if $environment }}
              {{ $delegatedZoneProviderConfigRef = index $environment "delegatedZoneProviderConfigRef" }}
            {{ end }}
          {{ end }}
          {{ if not $delegatedZoneProviderConfigRef }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: DelegatedZoneProviderConfigResolved
              status: "False"
              reason: MissingDelegatedZoneProviderConfigRef
              message: "No delegatedZoneProviderConfigRef was resolved. Set spec.delegatedZoneProviderConfigRef on the claim or define data.delegatedZoneProviderConfigRef in the platform-iam-rolesanywhere EnvironmentConfig."
              target: CompositeAndClaim
          {{ else }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: DelegatedZoneProviderConfigResolved
              status: "True"
              reason: ResolvedDelegatedZoneProviderConfigRef
              message: "A delegatedZoneProviderConfigRef was resolved for this claim."
              target: CompositeAndClaim
          {{ end }}

  - step: validate-iam-provider-configs
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $iamProviderConfigRef := .observed.composite.resource.spec.iamProviderConfigRef }}
          {{ $rolesAnywhereProviderConfigRef := .observed.composite.resource.spec.rolesAnywhereProviderConfigRef }}
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ if and (not $iamProviderConfigRef) $environment }}
            {{ $iamProviderConfigRef = index $environment "iamProviderConfigRef" }}
          {{ end }}
          {{ if and (not $rolesAnywhereProviderConfigRef) $environment }}
            {{ $rolesAnywhereProviderConfigRef = index $environment "rolesAnywhereProviderConfigRef" }}
          {{ end }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: IamProviderConfigResolved
              status: {{ if $iamProviderConfigRef }}"True"{{ else }}"False"{{ end }}
              reason: {{ if $iamProviderConfigRef }}ResolvedIamProviderConfigRef{{ else }}MissingIamProviderConfigRef{{ end }}
              message: {{ if $iamProviderConfigRef }}"An iamProviderConfigRef was resolved for this claim."{{ else }}"No iamProviderConfigRef was resolved. Set spec.iamProviderConfigRef on the claim or define data.iamProviderConfigRef in the platform-iam-rolesanywhere EnvironmentConfig."{{ end }}
              target: CompositeAndClaim
            - type: RolesAnywhereProviderConfigResolved
              status: {{ if $rolesAnywhereProviderConfigRef }}"True"{{ else }}"False"{{ end }}
              reason: {{ if $rolesAnywhereProviderConfigRef }}ResolvedRolesAnywhereProviderConfigRef{{ else }}MissingRolesAnywhereProviderConfigRef{{ end }}
              message: {{ if $rolesAnywhereProviderConfigRef }}"A rolesAnywhereProviderConfigRef was resolved for this claim."{{ else }}"No rolesAnywhereProviderConfigRef was resolved. Set spec.rolesAnywhereProviderConfigRef on the claim or define data.rolesAnywhereProviderConfigRef in the platform-iam-rolesanywhere EnvironmentConfig."{{ end }}
              target: CompositeAndClaim

  - step: validate-cloudflare-inputs
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ $zoneName := .observed.composite.resource.spec.zoneName }}
          {{ $zoneId := .observed.composite.resource.spec.zoneId }}
          {{ $cloudflareProviderConfigRef := .observed.composite.resource.spec.cloudflareProviderConfigRef }}
          {{ if and (not $zoneName) $environment }}
            {{ $zoneName = index $environment "zoneName" }}
          {{ end }}
          {{ if and (not $zoneId) $environment }}
            {{ $zoneId = index $environment "zoneId" }}
          {{ end }}
          {{ if and (not $cloudflareProviderConfigRef) $environment }}
            {{ $cloudflareProviderConfigRef = index $environment "cloudflareProviderConfigRef" }}
          {{ end }}
          ---
          apiVersion: meta.gotemplating.fn.crossplane.io/v1alpha1
          kind: ClaimConditions
          conditions:
            - type: ZoneNameResolved
              status: {{ if $zoneName }}"True"{{ else }}"False"{{ end }}
              reason: {{ if $zoneName }}ResolvedZoneName{{ else }}MissingZoneName{{ end }}
              message: {{ if $zoneName }}"A zoneName was resolved for this claim."{{ else }}"No zoneName was resolved. Set spec.zoneName on the claim or define data.zoneName in the platform-cloudflare EnvironmentConfig."{{ end }}
              target: CompositeAndClaim
            - type: ZoneIdResolved
              status: {{ if $zoneId }}"True"{{ else }}"False"{{ end }}
              reason: {{ if $zoneId }}ResolvedZoneId{{ else }}MissingZoneId{{ end }}
              message: {{ if $zoneId }}"A zoneId was resolved for this claim."{{ else }}"No zoneId was resolved. Set spec.zoneId on the claim or define data.zoneId in the platform-cloudflare EnvironmentConfig."{{ end }}
              target: CompositeAndClaim
            - type: CloudflareProviderConfigResolved
              status: {{ if $cloudflareProviderConfigRef }}"True"{{ else }}"False"{{ end }}
              reason: {{ if $cloudflareProviderConfigRef }}ResolvedCloudflareProviderConfigRef{{ else }}MissingCloudflareProviderConfigRef{{ end }}
              message: {{ if $cloudflareProviderConfigRef }}"A cloudflareProviderConfigRef was resolved for this claim."{{ else }}"No cloudflareProviderConfigRef was resolved. Set spec.cloudflareProviderConfigRef on the claim or define data.cloudflareProviderConfigRef in the platform-cloudflare EnvironmentConfig."{{ end }}
              target: CompositeAndClaim

  - step: create-zone
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ $trustAnchorArn := .observed.composite.resource.spec.trustAnchorArn }}
          {{ $delegatedZoneProviderConfigRef := .observed.composite.resource.spec.delegatedZoneProviderConfigRef }}
          {{ $zoneName := .observed.composite.resource.spec.zoneName }}
          {{ if and (not $trustAnchorArn) $environment }}
            {{ $trustAnchorArn = index $environment "trustAnchorArn" }}
          {{ end }}
          {{ if and (not $delegatedZoneProviderConfigRef) $environment }}
            {{ $delegatedZoneProviderConfigRef = index $environment "delegatedZoneProviderConfigRef" }}
          {{ end }}
          {{ if and (not $zoneName) $environment }}
            {{ $zoneName = index $environment "zoneName" }}
          {{ end }}
          {{ if and $trustAnchorArn $delegatedZoneProviderConfigRef $zoneName }}
          {{ $subdomain := .observed.composite.resource.spec.subdomain }}
          {{ $resourceName := printf "%s-%s" (replace "." "-" $subdomain) (replace "." "-" $zoneName) }}
          {{ $fullZoneName := printf "%s.%s" $subdomain $zoneName }}
          
          ---
          apiVersion: route53.aws.m.upbound.io/v1beta1
          kind: Zone
          metadata:
            name: {{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: delegated-zone
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              name: {{ $fullZoneName }}
              comment: "Delegated Hosted Zone for {{ $fullZoneName }} from Cloudflare Zone {{ $zoneName }}"
            providerConfigRef:
              kind: {{ $delegatedZoneProviderConfigRef.kind }}
              name: {{ $delegatedZoneProviderConfigRef.name }}
          {{ end }}

  - step: create-iam-resources
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ $subdomain := .observed.composite.resource.spec.subdomain }}
          {{ $zoneName := .observed.composite.resource.spec.zoneName }}
          {{ $trustAnchorArn := .observed.composite.resource.spec.trustAnchorArn }}
          {{ $delegatedZoneProviderConfigRef := .observed.composite.resource.spec.delegatedZoneProviderConfigRef }}
          {{ if and (not $zoneName) $environment }}
            {{ $zoneName = index $environment "zoneName" }}
          {{ end }}
          {{ if and (not $trustAnchorArn) $environment }}
            {{ $trustAnchorArn = index $environment "trustAnchorArn" }}
          {{ end }}
          {{ if and (not $delegatedZoneProviderConfigRef) $environment }}
            {{ $delegatedZoneProviderConfigRef = index $environment "delegatedZoneProviderConfigRef" }}
          {{ end }}
          {{ $iamProviderConfig := .observed.composite.resource.spec.iamProviderConfigRef }}
          {{ $rolesAnywhereProviderConfig := .observed.composite.resource.spec.rolesAnywhereProviderConfigRef }}
          {{ if and (not $iamProviderConfig) $environment }}
            {{ $iamProviderConfig = index $environment "iamProviderConfigRef" }}
          {{ end }}
          {{ if and (not $rolesAnywhereProviderConfig) $environment }}
            {{ $rolesAnywhereProviderConfig = index $environment "rolesAnywhereProviderConfigRef" }}
          {{ end }}
          {{ $resourceName := printf "%s-%s" (replace "." "-" $subdomain) (replace "." "-" $zoneName) }}
          {{ $fullZoneName := printf "%s.%s" $subdomain $zoneName }}
          {{ $spiffeURIPrefix := $fullZoneName }}
          {{ if and $environment (index $environment "spiffeURIPrefix") }}
            {{ $spiffeURIPrefix = index $environment "spiffeURIPrefix" }}
          {{ end }}
          {{ if and $zoneName $trustAnchorArn $delegatedZoneProviderConfigRef $iamProviderConfig $rolesAnywhereProviderConfig }}

          {{ $zoneId := "" }}
          {{ $roleArn := "" }}
          {{ $policyArn := "" }}
          {{ if .observed.resources }}
            {{ range $name, $resource := .observed.resources }}
              {{ if eq $resource.resource.kind "Zone" }}
                {{ if $resource.resource.status.atProvider.zoneId }}
                  {{ $zoneId = $resource.resource.status.atProvider.zoneId }}
                {{ end }}
              {{ end }}
              {{ if eq $resource.resource.kind "Role" }}
                {{ if $resource.resource.status.atProvider.arn }}
                  {{ $roleArn = $resource.resource.status.atProvider.arn }}
                {{ end }}
              {{ end }}
              {{ if eq $resource.resource.kind "Policy" }}
                {{ if $resource.resource.status.atProvider.arn }}
                  {{ $policyArn = $resource.resource.status.atProvider.arn }}
                {{ end }}
              {{ end }}
            {{ end }}
          {{ end }}

          ---
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: Role
          metadata:
            name: delegated-zone-{{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: iam-role
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              name: delegated-zone-{{ $resourceName }}
              description: "IAM Roles Anywhere role for ExternalDNS and cert-manager on {{ $fullZoneName }}"
              assumeRolePolicyDocument: |-
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Principal": {"Service": "rolesanywhere.amazonaws.com"},
                      "Action": ["sts:AssumeRole", "sts:TagSession", "sts:SetSourceIdentity"],
                      "Condition": {
                        "StringEquals": {
                          "aws:PrincipalTag/x509SAN/URI": [
                            "spiffe://{{ $spiffeURIPrefix }}/ns/cert-manager/sa/cert-manager",
                            "spiffe://{{ $spiffeURIPrefix }}/ns/external-dns/sa/external-dns"
                          ]
                        },
                        "ArnEquals": {"aws:SourceArn": "{{ $trustAnchorArn }}"}
                      }
                    }
                  ]
                }
            providerConfigRef:
              kind: {{ $iamProviderConfig.kind }}
              name: {{ $iamProviderConfig.name }}

          {{ if $zoneId }}
          ---
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: Policy
          metadata:
            name: delegated-zone-{{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: iam-policy
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              name: delegated-zone-{{ $resourceName }}
              description: "IAM Roles Anywhere policy for ExternalDNS and cert-manager on {{ $fullZoneName }}"
              policy: |-
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Sid": "ExternalDNSRecordManagement",
                      "Effect": "Allow",
                      "Action": ["route53:ChangeResourceRecordSets", "route53:ListResourceRecordSets", "route53:ListTagsForResources"],
                      "Resource": "arn:aws:route53:::hostedzone/{{ $zoneId }}",
                      "Condition": {
                        "StringEquals": {"aws:PrincipalTag/x509SAN/URI": "spiffe://{{ $spiffeURIPrefix }}/ns/external-dns/sa/external-dns"},
                        "ForAllValues:StringLike": {"route53:ChangeResourceRecordSetsRecordTypes": ["A", "AAAA", "CNAME", "TXT", "SRV"]}
                      }
                    },
                    {
                      "Sid": "ExternalDNSZoneDiscovery",
                      "Effect": "Allow",
                      "Action": "route53:ListHostedZones",
                      "Resource": "*",
                      "Condition": {
                        "StringEquals": {"aws:PrincipalTag/x509SAN/URI": "spiffe://{{ $spiffeURIPrefix }}/ns/external-dns/sa/external-dns"}
                      }
                    },
                    {
                      "Sid": "CertManagerACMEDNS01",
                      "Effect": "Allow",
                      "Action": ["route53:ChangeResourceRecordSets", "route53:ListResourceRecordSets"],
                      "Resource": "arn:aws:route53:::hostedzone/{{ $zoneId }}",
                      "Condition": {
                        "StringEquals": {
                          "aws:PrincipalTag/x509SAN/URI": "spiffe://{{ $spiffeURIPrefix }}/ns/cert-manager/sa/cert-manager",
                          "route53:ChangeResourceRecordSetsRecordTypes": ["TXT"]
                        }
                      }
                    },
                    {
                      "Sid": "CertManagerChangePolling",
                      "Effect": "Allow",
                      "Action": "route53:GetChange",
                      "Resource": "arn:aws:route53:::change/*",
                      "Condition": {
                        "StringEquals": {"aws:PrincipalTag/x509SAN/URI": "spiffe://{{ $spiffeURIPrefix }}/ns/cert-manager/sa/cert-manager"}
                      }
                    },
                    {
                      "Sid": "CertManagerZoneDiscovery",
                      "Effect": "Allow",
                      "Action": "route53:ListHostedZonesByName",
                      "Resource": "*",
                      "Condition": {
                        "StringEquals": {"aws:PrincipalTag/x509SAN/URI": "spiffe://{{ $spiffeURIPrefix }}/ns/cert-manager/sa/cert-manager"}
                      }
                    }
                  ]
                }
            providerConfigRef:
              kind: {{ $iamProviderConfig.kind }}
              name: {{ $iamProviderConfig.name }}
          {{ end }}

          {{ if $policyArn }}
          ---
          apiVersion: iam.aws.m.upbound.io/v1beta1
          kind: RolePolicyAttachment
          metadata:
            name: delegated-zone-{{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: iam-role-policy-attachment
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              policyArn: {{ $policyArn }}
              roleName: delegated-zone-{{ $resourceName }}
            providerConfigRef:
              kind: {{ $iamProviderConfig.kind }}
              name: {{ $iamProviderConfig.name }}
          {{ end }}

          {{ if $roleArn }}
          ---
          apiVersion: rolesanywhere.aws.m.upbound.io/v1beta1
          kind: Profile
          metadata:
            name: delegated-zone-{{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: rolesanywhere-profile
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              name: delegated-zone-{{ $resourceName }}
              enabled: true
              roleArns:
                - {{ $roleArn }}
            providerConfigRef:
              kind: {{ $rolesAnywhereProviderConfig.kind }}
              name: {{ $rolesAnywhereProviderConfig.name }}
          {{ end }}
          {{ end }}

  - step: create-ns-records
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ $trustAnchorArn := .observed.composite.resource.spec.trustAnchorArn }}
          {{ $delegatedZoneProviderConfigRef := .observed.composite.resource.spec.delegatedZoneProviderConfigRef }}
          {{ $zoneName := .observed.composite.resource.spec.zoneName }}
          {{ $zoneId := .observed.composite.resource.spec.zoneId }}
          {{ $cfProviderConfig := .observed.composite.resource.spec.cloudflareProviderConfigRef }}
          {{ if and (not $trustAnchorArn) $environment }}
            {{ $trustAnchorArn = index $environment "trustAnchorArn" }}
          {{ end }}
          {{ if and (not $delegatedZoneProviderConfigRef) $environment }}
            {{ $delegatedZoneProviderConfigRef = index $environment "delegatedZoneProviderConfigRef" }}
          {{ end }}
          {{ if and (not $zoneName) $environment }}
            {{ $zoneName = index $environment "zoneName" }}
          {{ end }}
          {{ if and (not $zoneId) $environment }}
            {{ $zoneId = index $environment "zoneId" }}
          {{ end }}
          {{ if and (not $cfProviderConfig) $environment }}
            {{ $cfProviderConfig = index $environment "cloudflareProviderConfigRef" }}
          {{ end }}
          {{ if and $trustAnchorArn $delegatedZoneProviderConfigRef $zoneName $zoneId $cfProviderConfig }}
          {{ $subdomain := .observed.composite.resource.spec.subdomain }}
          {{ $ttl := .observed.composite.resource.spec.ttl | default 1 }}
          {{ $resourceName := printf "%s-%s" (replace "." "-" $subdomain) (replace "." "-" $zoneName) }}
          {{ $fullZoneName := printf "%s.%s" $subdomain $zoneName }}
          {{ $spiffeURIPrefix := $fullZoneName }}
          {{ if and $environment (index $environment "spiffeURIPrefix") }}
            {{ $spiffeURIPrefix = index $environment "spiffeURIPrefix" }}
          {{ end }}
          
          {{ $nameServers := list }}
          {{ if .observed.resources }}
            {{ range $name, $resource := .observed.resources }}
              {{ if eq $resource.resource.kind "Zone" }}
                {{ if $resource.resource.status.atProvider.nameServers }}
                  {{ $nameServers = $resource.resource.status.atProvider.nameServers }}
                {{ end }}
              {{ end }}
            {{ end }}
          {{ end }}
          
          {{ if $nameServers }}
          {{ range $i, $ns := $nameServers }}
          ---
          apiVersion: dns.upjet-cloudflare.m.upbound.io/v1alpha1
          kind: Record
          metadata:
            name: ns{{ $i }}-{{ $resourceName }}
            annotations:
              gotemplating.fn.crossplane.io/composition-resource-name: ns-record-{{ $i }}
              gotemplating.fn.crossplane.io/ready: "True"
          spec:
            forProvider:
              zoneId: {{ $zoneId }}
              type: "NS"
              name: {{ $subdomain }}
              content: {{ $ns }}
              ttl: {{ $ttl }}
              comment: "Delegated Hosted Zone NS-{{ $i }} for {{ $fullZoneName }} in aws"
            providerConfigRef:
              kind: {{ $cfProviderConfig.kind }}
              name: {{ $cfProviderConfig.name }}
          {{ end }}
          {{ end }}
          {{ end }}

  - step: status-update
    functionRef:
      name: function-go-templating
    input:
      apiVersion: gotemplating.fn.crossplane.io/v1beta1
      kind: GoTemplate
      source: Inline
      inline:
        template: |
          {{ $environment := index .context "apiextensions.crossplane.io/environment" }}
          {{ $subdomain := .observed.composite.resource.spec.subdomain }}
          {{ $zoneName := .observed.composite.resource.spec.zoneName }}
          {{ $trustAnchorArn := .observed.composite.resource.spec.trustAnchorArn }}
          {{ $delegatedZoneProviderConfigRef := .observed.composite.resource.spec.delegatedZoneProviderConfigRef }}
          {{ if and (not $zoneName) $environment }}
            {{ $zoneName = index $environment "zoneName" }}
          {{ end }}
          {{ if and (not $trustAnchorArn) $environment }}
            {{ $trustAnchorArn = index $environment "trustAnchorArn" }}
          {{ end }}
          {{ if and (not $delegatedZoneProviderConfigRef) $environment }}
            {{ $delegatedZoneProviderConfigRef = index $environment "delegatedZoneProviderConfigRef" }}
          {{ end }}
          {{ $nameServers := list }}
          {{ $zoneId := "" }}
          {{ $roleArn := "" }}
          {{ $profileArn := "" }}
          {{ $spiffeURIPrefix := printf "%s.%s" $subdomain $zoneName }}
          {{ if and $environment (index $environment "spiffeURIPrefix") }}
            {{ $spiffeURIPrefix = index $environment "spiffeURIPrefix" }}
          {{ end }}
          {{ if and $zoneName $trustAnchorArn $delegatedZoneProviderConfigRef }}

          {{ if .observed.resources }}
            {{ range $name, $resource := .observed.resources }}
              {{ if eq $resource.resource.kind "Zone" }}
                {{ if $resource.resource.status.atProvider.nameServers }}
                  {{ $nameServers = $resource.resource.status.atProvider.nameServers }}
                {{ end }}
                {{ if $resource.resource.status.atProvider.zoneId }}
                  {{ $zoneId = $resource.resource.status.atProvider.zoneId }}
                {{ end }}
              {{ end }}
              {{ if eq $resource.resource.kind "Role" }}
                {{ if $resource.resource.status.atProvider.arn }}
                  {{ $roleArn = $resource.resource.status.atProvider.arn }}
                {{ end }}
              {{ end }}
              {{ if eq $resource.resource.kind "Profile" }}
                {{ if $resource.resource.status.atProvider.arn }}
                  {{ $profileArn = $resource.resource.status.atProvider.arn }}
                {{ end }}
              {{ end }}
            {{ end }}
          {{ end }}

          {{ if and $nameServers $roleArn $profileArn }}
          ---
          apiVersion: dns.platform.rye.ninja/v1alpha1
          kind: XDelegatedHostedZoneAWS
          metadata:
            annotations:
              gotemplating.fn.crossplane.io/ready: "True"
          status:
            trustDomain: {{ $spiffeURIPrefix }}
            trustAnchorArn: {{ $trustAnchorArn }}
            iamRoleArn: {{ $roleArn }}
            profileArn: {{ $profileArn }}
            nameServers:
            {{ range $nameServers }}
            - {{ . }}
            {{ end }}
            {{ if $zoneId }}
            zoneId: {{ $zoneId }}
            {{ end }}
          {{ end }}
          {{ end }}