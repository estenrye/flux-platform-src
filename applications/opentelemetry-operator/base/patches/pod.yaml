- op: add
  path: /metadata/labels/helm.sh~1hook
  value: test
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1restart-policy
  value: "This deployment needs a restart policy of Never in order to properly function as a test job."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
  value: "This deployment does not need a liveness probe because it is a test job that will not be restarted on failure and does not need health monitoring."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-readiness-probe
  value: "This deployment does not need a readiness probe because it is a test job that will not be restarted on failure and does not need health monitoring."
- op: add
  path: /spec/affinity
  value:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: servers.ngpc.rxt.io/type
                operator: In
                values:
                  - spot
- op: add
  path: /spec/serviceAccountName
  value: opentelemetry-operator-tests
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=opentelemetry-operator helm test Pods require the service account token to interact with the cluster during test execution."
- op: add
  path: /metadata/annotations/checkov.io~1skip2
  value: "CKV_K8S_8=Helm test hook Pods are short-lived validation jobs with restartPolicy Never and intentionally do not use liveness probes."
- op: add
  path: /metadata/annotations/checkov.io~1skip3
  value: "CKV_K8S_9=Helm test hook Pods are short-lived validation jobs with restartPolicy Never and intentionally do not use readiness probes."
