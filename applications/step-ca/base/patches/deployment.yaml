- op: remove
  path: /spec/volumeClaimTemplates
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: database
    emptyDir: {}
- op: add
  path: /spec/strategy
  value:
    type: RollingUpdate
- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=step-ca requires the service account token for the Kubernetes API when using the K8sSA provisioner."
- op: add
  path: /metadata/annotations/checkov.io~1skip2
  value: "CKV_K8S_35=PGPASSWORD must be an environment variable; lib/pq reads PostgreSQL credentials from the environment and does not support file-based injection."
- op: add
  path: /metadata/annotations/checkov.io~1skip3
  value: "CKV_K8S_40=step-ca image runs as the step user at UID 1000; changing the UID would break file ownership inside the container image."
- op: add
  path: /metadata/annotations/checkov.io~1skip4
  value: "CKV_K8S_31=step-ca binary fails to exec with RuntimeDefault seccomp on this cluster's container runtime; Unconfined seccomp profile is required for the binary to execute successfully."
- op: add
  path: /metadata/annotations/checkov.io~1skip5
  value: "CKV_K8S_20=step-ca binary has CAP_NET_BIND_SERVICE file capability set in the image; allowPrivilegeEscalation must be true to allow execve to succeed with no_new_privs otherwise disabled by the capability bit."
- op: add
  path: /metadata/annotations/checkov.io~1skip6
  value: "CKV_K8S_22=step-ca binary has file capabilities that cause nosuid overlay mounts to block execve with EPERM when readOnlyRootFilesystem is enabled; writable root filesystem is required for this image."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1default-service-account
  value: "step-ca uses the chart default service account; a dedicated SA is not required for this single-tenant CA."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1env-value-from
  value: "Secret step-ca-db-app is created at runtime by CNPG and does not exist in the static rendered manifest."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1minimum-three-replicas
  value: "step-ca is a CA; it intentionally runs as a single instance to avoid split-brain certificate issuance."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
  value: "step-ca runs in a single-zone cluster and does not require node affinity rules."
- op: add
  path: /metadata/annotations/checkov.io~1skip7
  value: "CKV_K8S_25=step-ca binary has CAP_NET_BIND_SERVICE as a file capability with the effective bit set; it must be present in the bounding set or execve fails with EPERM even though step-ca listens on ports above 1024."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1no-read-only-root-fs
  value: "step-ca binary has file capabilities that cause nosuid overlay mounts to block execve with EPERM when readOnlyRootFilesystem is enabled; writable root filesystem is required for this image."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1privilege-escalation-container
  value: "step-ca binary has CAP_NET_BIND_SERVICE file capability set in the image; allowPrivilegeEscalation must be true to allow execve to succeed, with capabilities.drop=[ALL] keeping the bounding set empty so no capabilities are actually granted."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1read-secret-from-env-var
  value: "PGPASSWORD must be an environment variable; lib/pq reads PostgreSQL credentials from the environment and does not support file-based injection."
- op: add
  path: /spec/template/metadata/annotations/secret.reloader.stakater.com~1reload
  value: "csi-driver-spiffe-ca"
- op: replace
  path: /spec/template/spec/containers/0/args/0
  value: /home/step/config-rw/ca.json
- op: add
  path: /spec/template/spec/initContainers
  value:
    - name: patch-ca-config
      image: cr.smallstep.com/smallstep/step-ca:0.30.2@sha256:a2b17872915c193259b75a5474c398326f41bd199f0842093e52cf4182bc8270
      command:
        - /bin/sh
        - -c
        - |
          ROOT_B64=$(cat /home/step/external-certs/tls.crt | base64 | tr -d '\n')
          sed "s|ROOTS_PLACEHOLDER|$ROOT_B64|" /home/step/config/ca.json > /home/step/config-rw/ca.json
      volumeMounts:
        - name: config
          mountPath: /home/step/config
          readOnly: true
        - name: spiffe-ca-certs
          mountPath: /home/step/external-certs
          readOnly: true
        - name: config-rw
          mountPath: /home/step/config-rw
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
