apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: step-ca
  namespace: step-ca
  annotations:
    ignore-check.kube-linter.io/dangling-networkpolicypeer-podselector: "CNPG creates PostgreSQL pods dynamically; the cnpg.io/cluster label is valid but pods do not exist in the static rendered manifest."
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: step-certificates
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              step-ca.io/test-access: "true"
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: step-ca-db
      ports:
        - protocol: TCP
          port: 5432
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
