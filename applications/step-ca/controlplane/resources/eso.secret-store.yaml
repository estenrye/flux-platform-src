apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: cert-manager-secrets
  namespace: step-ca
spec:
  provider:
    kubernetes:
      remoteNamespace: cert-manager
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: step-ca-cert-reader
          namespace: step-ca
