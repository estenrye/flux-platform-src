apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-policy-approver-allow-egress
  namespace: cert-manager
spec:
  podSelector:
    matchLabels:
      app: cert-manager-approver-policy
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager-policy-approver-allow-ingress
  namespace: cert-manager
spec:
  ingress:
  - ports:
    - port: webhook
      protocol: TCP
    - port: metrics
      protocol: TCP
    - port: healthcheck
      protocol: TCP
  podSelector:
    matchLabels:
      app: cert-manager-approver-policy
      app.kubernetes.io/instance: cert-manager-approver-policy
      app.kubernetes.io/name: cert-manager-approver-policy
  policyTypes:
  - Ingress