apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cert-manager

resources:
  - network-policy.yaml

helmCharts:
  - name: cert-manager-approver-policy
    repo: oci://quay.io/jetstack/charts
    version: v0.24.0
    releaseName: cert-manager-approver-policy
    namespace: cert-manager
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: RoleBinding
    path: patches/rolebinding.yaml