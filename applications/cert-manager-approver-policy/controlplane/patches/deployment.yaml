- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/template/spec/containers/0/livenessProbe
  value:
    httpGet:
      path: /readyz
      port: 6060
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=cert-manager-approver-policy requires the service account token to approve or deny CertificateRequests via cert-manager APIs."
