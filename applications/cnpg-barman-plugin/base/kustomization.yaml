apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CNPG-I Barman Cloud plugin (replaces the in-tree barmanObjectStore API,
# removed in CNPG 1.31.0; cluster is on 1.30.0). Deployed into cnpg-system
# alongside the operator itself — see applications/cnpg/base.
#
# ObjectStore resources and Cluster/ScheduledBackup plugin wiring live
# with each consuming app (e.g. applications/step-ca-db).

resources:
  - resources/manifest.yaml
  - resources/network-policy.yaml
  - resources/certificate-request-policy.yaml
  - resources/certificate-request-policy-rbac.yaml

images:
  - name: ghcr.io/cloudnative-pg/plugin-barman-cloud
    newTag: v0.13.0
    digest: sha256:71589dbac582333442812b07b31f7ea4d00324a8358aac7ca507dabf9f4b6c96

patches:
  - target:
      kind: Deployment
      name: barman-cloud
    patch: |-
      - op: add
        path: /metadata/annotations
        value: {}
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-cpu-requirements
        value: "Plugin resource envelope to be tuned after M3 backup baseline data is available; upstream chart sets none."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1unset-memory-requirements
        value: "Plugin resource envelope to be tuned after M3 backup baseline data is available; upstream chart sets none."
      - op: add
        path: /metadata/annotations/checkov.io~1skip01
        value: "CKV_K8S_10=Plugin resource requests deferred until M3 backup baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip02
        value: "CKV_K8S_11=Plugin resource limits deferred until M3 backup baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip03
        value: "CKV_K8S_12=Plugin resource requests deferred until M3 backup baseline data is available."
      - op: add
        path: /metadata/annotations/checkov.io~1skip04
        value: "CKV_K8S_13=Plugin resource limits deferred until M3 backup baseline data is available."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-liveness-probe
        value: "Upstream sets a readinessProbe only; no separate liveness probe is defined for the plugin controller."
      - op: add
        path: /metadata/annotations/checkov.io~1skip05
        value: "CKV_K8S_8=Upstream sets a readinessProbe only; no separate liveness probe is defined for the plugin controller."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1read-secret-from-env-var
        value: "SIDECAR_IMAGE is an image reference, not a credential; the controller reads it once at startup to know which sidecar image to inject into CNPG instance pods."
      - op: add
        path: /metadata/annotations/checkov.io~1skip06
        value: "CKV_K8S_35=SIDECAR_IMAGE is an image reference, not a credential; upstream design, not configurable via manifest alone."
      - op: add
        path: /metadata/annotations/checkov.io~1skip07
        value: "CKV_K8S_38=The plugin controller requires its service account token for leader election and ObjectStore/Backup/Secret watches (CNPG-I interface)."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1minimum-three-replicas
        value: "Single-replica leader-elected controller by upstream design; matches the CNPG operator's own singleton pattern."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-node-affinity
        value: "Single-host homelab cluster; no zone or role topology to express affinity against."
      - op: add
        path: /metadata/annotations/ignore-check.kube-linter.io~1no-rolling-update-strategy
        value: "Recreate is upstream's explicit strategy for this leader-elected singleton controller — avoids two instances briefly holding the leader lock during a rolling update."
      - op: add
        path: /spec/template/spec/restartPolicy
        value: Always

  - target:
      kind: NetworkPolicy
      name: barman-plugin-allow-ingress
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/dangling-networkpolicypeer-podselector: "The CNPG operator (app.kubernetes.io/name=cloudnative-pg) lives in a sibling Kustomization (applications/cnpg/base); not visible when this app renders in isolation, but present in the combined cluster render."

  - target:
      kind: NetworkPolicy
      name: cnpg-operator-allow-egress-barman-plugin
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/dangling-networkpolicy: "The CNPG operator (app.kubernetes.io/name=cloudnative-pg) lives in a sibling Kustomization (applications/cnpg/base); not visible when this app renders in isolation, but present in the combined cluster render."

  - target:
      kind: ClusterRoleBinding
      name: plugin-barman-cloud-binding
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          ignore-check.kube-linter.io/access-to-secrets: "The plugin reads per-Cluster barman credentials Secrets across namespaces by design (CNPG-I backup/archive/restore interface); scope matches upstream's own ClusterRole."
