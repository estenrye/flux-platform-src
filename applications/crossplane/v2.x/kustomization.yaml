apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crossplane-system

helmCharts:
  - name: crossplane
    repo: https://charts.crossplane.io/stable
    version: 2.2.0
    releaseName: crossplane
    namespace: crossplane-system
    includeCRDs: true
    valuesFile: values.yaml

transformers:
  - labels.yaml