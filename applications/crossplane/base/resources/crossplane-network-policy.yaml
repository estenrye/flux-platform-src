apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crossplane-allow-egress
  namespace: crossplane-system
spec:
  podSelector:
    matchLabels:
      app: crossplane
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crossplane-allow-ingress
  namespace: crossplane-system
spec:
  ingress:
  - ports:
    - port: webhooks
      protocol: TCP
    - port: metrics
      protocol: TCP
    - port: readyz
      protocol: TCP
  podSelector:
    matchLabels:
      app: crossplane
      app.kubernetes.io/instance: crossplane
      app.kubernetes.io/name: crossplane
  policyTypes:
  - Ingress