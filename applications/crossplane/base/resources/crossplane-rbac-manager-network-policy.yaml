apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crossplane-rbac-manager-allow-egress
  namespace: crossplane-system
spec:
  podSelector:
    matchLabels:
      app: crossplane-rbac-manager
  policyTypes:
  - Egress
  egress:
  # apiserver targetPort - Calico evaluates egress post-DNAT
  # (docs/memory/calico-networkpolicy-dnat.md). Talos serves the apiserver
  # on 6443; the namespaceSelector rule below cannot match node endpoints.
  - ports:
    - protocol: TCP
      port: 6443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
    ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: crossplane-rbac-manager-allow-ingress
  namespace: crossplane-system
spec:
  ingress:
  - ports:
    - port: metrics
      protocol: TCP
  podSelector:
    matchLabels:
      app: crossplane-rbac-manager
      app.kubernetes.io/instance: crossplane
      app.kubernetes.io/name: crossplane
  policyTypes:
  - Ingress