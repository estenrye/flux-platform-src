apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: reloader

resources:
  - resources/namespace.yaml

helmCharts:
  - name: reloader
    repo: https://stakater.github.io/stakater-charts
    version: 2.2.9
    releaseName: reloader
    namespace: reloader
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: NetworkPolicy
    path: patches/network-policy.yaml
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  
  - target:
      kind: ClusterRoleBinding
    path: patches/clusterRoleBinding.yaml

images:
  - name: ghcr.io/stakater/reloader
    digest: sha256:0530cf462fa3ba530fab887372e3b79caf608d0093ffc2fded9fa33bac8b74cd