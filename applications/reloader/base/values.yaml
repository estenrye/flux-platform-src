reloader:
  enableMetricsByNamespace: true
  readOnlyRootFileSystem: true
  enableHA: true
  resourceLabelSelector: "rye.ninja/reloader=enabled"

  deployment:
    priorityClassName: cicd
    replicas: 3
    resources:
      limits:
        cpu: 150m
        memory: 512Mi
      requests:
        cpu: 10m
        memory: 128Mi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: "app.kubernetes.io/name"
                    operator: In
                    values:
                      - reloader
              topologyKey: "kubernetes.io/hostname"
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
                - key: servers.ngpc.rxt.io/type
                  operator: In
                  values:
                    - ondemand

  podMonitor:
    enabled: true

  podDisruptionBudget:
    enabled: false

  netpol:
    enabled: true
    from: []
    to: []