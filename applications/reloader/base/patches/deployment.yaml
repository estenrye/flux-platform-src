- op: add
  path: /spec/template/spec/restartPolicy
  value: Always
- op: add
  path: /spec/strategy
  value:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
- op: add
  path: /spec/template/spec/dnsPolicy
  value: Default
- op: add
  path: /metadata/annotations/checkov.io~1skip1
  value: "CKV_K8S_38=Reloader requires the service account token to watch ConfigMaps and Secrets and trigger pod restarts."