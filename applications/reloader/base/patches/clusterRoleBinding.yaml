- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1access-to-secrets
  value: "This deployment needs access to watch secrets for changes in order to reload pods when secrets change."
- op: add
  path: /metadata/annotations/ignore-check.kube-linter.io~1access-to-create-pods
  value: "This deployment needs access to create pods in order to reload them when secrets change."