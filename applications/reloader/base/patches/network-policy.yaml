# The chart's built-in egress rule allows 443 only; on clusters whose
# apiserver targetPort is 6443 (e.g. Talos) Calico evaluates egress
# post-DNAT and drops it (docs/memory/calico-networkpolicy-dnat.md).
# The chart's netpol.to values are peers (cannot carry ports), so the
# extra rule is appended here instead.
- op: add
  path: /spec/egress/-
  value:
    ports:
      - port: 6443
        protocol: TCP
