apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml

helmCharts:
  - name: cloudnative-pg
    repo: oci://ghcr.io/cloudnative-pg/charts
    version: 0.29.0
    releaseName: cnpg
    namespace: cnpg-system
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: ClusterRole
    path: patches/cluster-role.yaml
  - target:
      kind: ClusterRoleBinding
    path: patches/cluster-role-binding.yaml

images:
  # ≥1.29.2 is required on IPv6-only clusters: 1.29.1 built the instance
  # status URL with an unbracketed pod IP (upstream #10713, fix #10682),
  # sticking clusters at "Instance Status Extraction Error". Chart 0.29.0
  # pairs with 1.30.0 and ships the EndpointSlice RBAC that 1.29.2+ needs.
  - name: ghcr.io/cloudnative-pg/cloudnative-pg
    newTag: "1.30.0"
    digest: sha256:a2701eb97cdd2a34b1fdb2cb51987f544b706e40bec72ae7146cd8580efefebb
