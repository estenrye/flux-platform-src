apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml

helmCharts:
  - name: cloudnative-pg
    repo: oci://ghcr.io/cloudnative-pg/charts
    version: 0.28.3
    releaseName: cnpg
    namespace: cnpg-system
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: ClusterRole
    path: patches/cluster-role.yaml
  - target:
      kind: ClusterRoleBinding
    path: patches/cluster-role-binding.yaml

images:
  # 1.29.2: fixes the 1.29.1 IPv6 regression (unbracketed pod IP in the
  # instance status URL — upstream #10713, fix #10682) that left clusters
  # stuck in "Instance Status Extraction Error" on v6-only networks.
  - name: ghcr.io/cloudnative-pg/cloudnative-pg
    newTag: "1.29.2"
    digest: sha256:4710b10a4897a4f888cbe80bce8b279475315590fb9f2cb0ebb516f2f40ebf06
