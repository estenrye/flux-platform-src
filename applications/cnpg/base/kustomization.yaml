apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system

resources:
  - resources/namespace.yaml
  - resources/network-policy.yaml

helmCharts:
  - name: cloudnative-pg
    repo: oci://ghcr.io/cloudnative-pg/charts
    version: 0.28.3
    releaseName: cnpg
    namespace: cnpg-system
    includeCRDs: true
    valuesFile: values.yaml

patches:
  - target:
      kind: Deployment
    path: patches/deployment.yaml
  - target:
      kind: ClusterRole
    path: patches/cluster-role.yaml
  - target:
      kind: ClusterRoleBinding
    path: patches/cluster-role-binding.yaml

images:
  - name: ghcr.io/cloudnative-pg/cloudnative-pg
    newTag: "1.29.1"
    digest: sha256:0dfff19ba7b52ca25851a1010028b6940fff2e233290465af1cfb08a5f3f4661
