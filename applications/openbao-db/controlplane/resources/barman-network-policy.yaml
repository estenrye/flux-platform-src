apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openbao-db-barman
  namespace: openbao
  annotations:
    ignore-check.kube-linter.io/dangling-networkpolicy: "CNPG creates PostgreSQL pods dynamically; the cnpg.io/cluster label is valid but pods do not exist in the static rendered manifest."
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: openbao-db
  policyTypes:
    - Egress
  egress:
    # Barman WAL archiving and base backups to Garage S3 API.
    # Calico evaluates post-DNAT: target the pod port (3900) directly.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
          podSelector:
            matchLabels:
              app.kubernetes.io/name: garage
      ports:
        - protocol: TCP
          port: 3900
    - ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
