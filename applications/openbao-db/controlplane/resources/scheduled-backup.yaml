apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: openbao-db-backup
  namespace: openbao
spec:
  schedule: "0 30 3 * * *"
  backupOwnerReference: self
  cluster:
    name: openbao-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  target: primary
  immediate: true
