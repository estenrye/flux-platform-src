apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: openbao-db
  namespace: openbao
spec:
  instances: 3

  postgresql:
    parameters:
      max_connections: "100"

  bootstrap:
    initdb:
      database: openbao
      owner: openbao

  storage:
    size: 10Gi

  primaryUpdateStrategy: unsupervised

  monitoring:
    enablePodMonitor: true
