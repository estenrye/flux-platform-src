AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Admin Roles Anywhere stack for Crossplane providers with SPIFFE identity integration'

Parameters:
  ClusterCN:
    Type: String
    Description: 'Common Name (CN) of the SPIFFE identity for the cluster, used in trust relationships for IAM and Roles Anywhere admin roles'
  IAMAdminPolicyArn:
    Type: String
    Description: 'ARN of the IAM Admin policy for the Roles Anywhere admin role'
Resources:
  # IAM admin role for provider-aws-iam
  IAMRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: !Sub '${AWS::StackName}-crossplane-provider-iam-admin'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: 'rolesanywhere.amazonaws.com'
            Action:
              - 'sts:AssumeRole'
              - 'sts:SetSourceIdentity'
              - 'sts:TagSession'
            Condition:
              StringEquals:
                'aws:PrincipalTag/x509SAN/URI': !Sub 'spiffe://${ClusterCN}/ns/crossplane-system/sa/aws-iam-admin-provider'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/IAMFullAccess'
        - !Ref IAMAdminPolicyArn
      
      Tags:
        - Key: 'Name'
          Value: !Sub '${AWS::StackName}-crossplane-provider-iam-admin'
        - Key: 'Purpose'
          Value: !Sub 'Crossplane AWS IAM Provider Admin Role for Cloudformation Stack ${AWS::StackName}'

  # Roles Anywhere profile for IAM admin role
  RolesAnywhereProfile:
    Type: 'AWS::RolesAnywhere::Profile'
    Properties:
      Name: !Sub '${AWS::StackName}-crossplane-provider-iam-admin'
      RoleArns:
        - !GetAtt IAMRole.Arn
      RequireInstanceProperties: false
      Enabled: true
      SessionPolicy: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "iam:*"
              ],
              "Resource": "*"
            }
          ]
        }
      Tags:
        - Key: 'Name'
          Value: !Sub '${AWS::StackName}-crossplane-provider-iam-admin'
        - Key: 'Purpose'
          Value: !Sub 'Crossplane IAM Admin Roles Anywhere Profile for Cloudformation Stack ${AWS::StackName}'

Outputs:
  IAMRoleName:
    Description: 'Name of the created IAM admin role'
    Value: !Ref IAMRole
    Export:
      Name: !Sub '${AWS::StackName}-IAMRoleName'

  IAMRoleArn:
    Description: 'ARN of the created IAM admin role'
    Value: !GetAtt IAMRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-IAMRoleArn'

  RolesAnywhereProfileId:
    Description: 'ID of the created Roles Anywhere profile'
    Value: !Ref RolesAnywhereProfile
    Export:
      Name: !Sub '${AWS::StackName}-RolesAnywhereProfileId'

  RolesAnywhereProfileArn:
    Description: 'ARN of the created Roles Anywhere profile'
    Value: !GetAtt RolesAnywhereProfile.ProfileArn
    Export:
      Name: !Sub '${AWS::StackName}-RolesAnywhereProfileArn'
