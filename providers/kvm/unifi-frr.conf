! FRR configuration for the UniFi gateway — `controlplane` cluster BGP peering.
! Upload by hand via UniFi Network > Settings > Routing > BGP (M1 design §4.4,
! execution step 1). This file is the source of truth; the network chainsaw
! suite drift-checks the running config against it.
!
! Gateway AS 64512 peers with Calico AS 64513 over IPv6 on VLAN 100.
! Talos nodes initiate sessions toward the gateway's VLAN 100 GUA
! (2607:3640:1064:270::1). Node source addresses are SLAAC-derived and not
! statically predictable, so the gateway accepts dynamic neighbors from the
! VLAN 100 GUA /64 (and the ULA /64, in case peering moves to ULA later).
!
! Safety properties encoded here:
!   - Inbound: only the two Calico VIP pools are accepted (internal ULA pool
!     fd97:45c2:b3a1:f00::/112 and ingress GUA pool
!     2607:3640:1064:27f::/112), as the /112 or more-specific routes. Both
!     are routed, not-on-link, dedicated blocks (services-network design,
!     2026-07-15) — no VLAN, no RA; the gateway's BGP-learned routes are the
!     only path to them. This replaces the prior on-link-carved pools
!     (fd97:45c2:b3a1:100:ffff::/112, 2607:3640:1064:270:ffff::/112), which
!     lived inside VLAN 100's connected /64s and caused client NDP
!     flakiness plus a gateway-side forwarding failure for BGP routes
!     nested in a connected subnet (root-caused 2026-07-15).
!   - Outbound: nothing is announced to the cluster (nodes default-route via
!     RA), and the ULA + GUA VIP prefixes must never leave the site — the
!     gateway has no upstream BGP peers, but DENY-ALL-OUT guards against a
!     future peer inheriting an unfiltered session. Verification includes a
!     WAN-side check that neither pool is reachable (M1 design step 11).
!
! GUA RENUMBER: the 2607:3640:1064:27f:: ingress VIP block is a manual pick
! from gua_pd_prefix in providers/kvm/network.yaml (the TFiber PD, currently
! a /60), not a formula — regenerate this file per
! docs/runbooks/gua-prefix-renumber.md on ISP re-delegation. The BGP peering
! ranges below (listen range) are unaffected — peering stays on VLAN 100's
! gua_prefix/ULA /64s regardless of where the VIP pools live.
!
frr defaults traditional
!
router bgp 64512
 bgp router-id 10.45.0.1
 no bgp ebgp-requires-policy
 bgp listen limit 16
 neighbor CALICO peer-group
 neighbor CALICO remote-as 64513
 neighbor CALICO description Talos controlplane cluster (Calico)
 bgp listen range 2607:3640:1064:270::/64 peer-group CALICO
 bgp listen range fd97:45c2:b3a1:100::/64 peer-group CALICO
 !
 address-family ipv6 unicast
  neighbor CALICO activate
  neighbor CALICO prefix-list CALICO-VIPS-IN in
  neighbor CALICO prefix-list DENY-ALL-OUT out
 exit-address-family
!
ipv6 prefix-list CALICO-VIPS-IN seq 10 permit fd97:45c2:b3a1:f00::/112 le 128
ipv6 prefix-list CALICO-VIPS-IN seq 20 permit 2607:3640:1064:27f::/112 le 128
ipv6 prefix-list CALICO-VIPS-IN seq 90 deny ::/0 le 128
!
ipv6 prefix-list DENY-ALL-OUT seq 10 deny ::/0 le 128
!
